parameters:
  # Define checkout name for the Trident repo. If this is
  # loaded from a pipeline hosted in the Trident repo, use
  # `self`. If this is loaded from a pipeline hosted in a
  # different repo, use the repository name defined in the
  # pipeline resources.
  - name: tridentRepoName
    type: string
    default: self

steps:
  - checkout: ${{ parameters.tridentRepoName }}
    fetchDepth: 1
    path: s/trident
  - bash: |
      echo "Setting TRIDENT_SOURCE_DIR variable: $(Pipeline.Workspace)/s/trident"
      echo "##vso[task.setvariable variable=TRIDENT_SOURCE_DIR]$(Pipeline.Workspace)/s/trident"
    displayName: "Set TRIDENT_SOURCE_DIR variable"

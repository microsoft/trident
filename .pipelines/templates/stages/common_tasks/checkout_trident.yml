parameters:
  # Define checkout name for the Trident repo. If this is
  # loaded from a pipeline hosted in the Trident repo, use
  # `self`. If this is loaded from a pipeline hosted in a
  # different repo, use the repository name defined in the
  # pipeline resources.
  - name: tridentRepoName
    type: string
    default: self

  # Define output variable name for the trident repo source
  # directory.
  - name: tridentSourceDirectoryVariableName
    type: string
    default: TRIDENT_SOURCE_DIR

steps:
  - checkout: ${{ parameters.tridentRepoName }}
    fetchDepth: 1
    path: s/trident
  - bash: |
      echo "Setting ${{ parameters.tridentSourceDirectoryVariableName }} variable: $(Pipeline.Workspace)/s/trident"
      echo "##vso[task.setvariable variable=${{ parameters.tridentSourceDirectoryVariableName }}]$(Pipeline.Workspace)/s/trident"
    displayName: "Set ${{ parameters.tridentSourceDirectoryVariableName }} variable"

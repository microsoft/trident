parameters:
  - name: tridentSourceDirectory
    type: string

steps:
  # Download a preview AZL4 base VHDX from storage account.
  - task: AzureCLI@2
    displayName: "Download AZL4 base VHDX from blob"
    inputs:
      azureSubscription: azlinuxbmpstaging-storage-account-read
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: ${{ parameters.tridentSourceDirectory }}
      inlineScript: |
        set -euxo pipefail

        mkdir -p $(Build.ArtifactStagingDirectory)/images
        az storage blob download \
          --max-connections 10 \
          --auth-mode login \
          --account-name azlinuxbmpstaging \
          --container-name azl4-qemu-guest \
          --name azl4_qemu_guest.vhdx \
          --file $(Build.ArtifactStagingDirectory)/images/azl4_qemu_guest.vhdx
        ls -la $(Build.ArtifactStagingDirectory)/images/azl4_qemu_guest.vhdx

  # AZL4 netplan (1.1.2) is incompatible with systemd (258.4). 1.1.2 is the current
  # release of netplan, but an unreleased refactor in main fixes the problem. Our
  # tests depend on netplan, so workaround this for now with cached RPMs built from
  # netplan unreleased main.
  - task: AzureCLI@2
    displayName: "Download preview of unreleased netplan (branch=main) RPMs from blob"
    inputs:
      azureSubscription: azlinuxbmpstaging-storage-account-read
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: ${{ parameters.tridentSourceDirectory }}
      inlineScript: |
        set -euxo pipefail

        mkdir -p ${{ parameters.tridentSourceDirectory }}/bin/RPMS
        az storage blob download-batch \
          --max-connections 10 \
          --auth-mode login \
          --account-name azlinuxbmpstaging \
          --source netplan-main \
          --pattern "*.rpm" \
          --destination ${{ parameters.tridentSourceDirectory }}/bin/RPMS
        ls -la ${{ parameters.tridentSourceDirectory }}/bin/RPMS

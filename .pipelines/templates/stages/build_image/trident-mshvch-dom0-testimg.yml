parameters:
- name: outputArtifactName
  type: string
  default: mshvch-dom0-testimg

stages:
- stage: TridentTestImg_${{ replace(parameters.outputArtifactName, '-', '_') }}
  displayName: Build ${{ parameters.outputArtifactName }}
  dependsOn: Trident

  jobs:
  - job: BuildTridentTestImg
    displayName: Build
    timeoutInMinutes: 30
    pool:
      type: linux
      name: ecf-ado-agent-linux-pool

    variables:
      - name: ob_outputDirectory
        value: /tmp/output
      - name: ob_artifactBaseName
        value: ${{ parameters.outputArtifactName }}
      - name: mic_package
        value: DEFAULT
      - name: mic_version
        value: DEFAULT
      - name: mic_commit
        value: DEFAULT
      - name: baseimg_package
        value: baremetal_vhdx-2.0-stable
      - name: baseimg_version
        value: DEFAULT
      - group: coreos_mariner_hci_staging_lisa_kva_functional_tests_service_principal

    steps:
    # Disabled in .pipelines/templates/e2e-template.yml.
    # Update this stage for the test-images migration before re-enabling it.
    - script: |
        echo "Disabled pending migration updates before this stage can be re-enabled."
        exit 1
      displayName: Disabled pending migration

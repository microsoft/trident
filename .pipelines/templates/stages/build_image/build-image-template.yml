parameters:
  - name: tridentSourceDirectory
    type: string

  - name: imageName
    type: string

  - name: architecture
    displayName: System Architecture
    type: string
    default: "amd64"
    values:
      - arm64
      - amd64

  - name: azureLinuxVersion
    displayName: Version of AzureLinux for the Base Image
    type: string
    values:
      - "2.0"
      - "3.0"
      - "4.0-preview"
    default: "3.0"

  - name: micBuildType
    displayName: MIC Build Type
    type: string
    values:
      - dev
      - preview
      - release
    default: release

  - name: micVersion
    displayName: MIC Version
    type: string
    default: "*.*.*"

  - name: baseimgBuildType
    displayName: Base Image build type
    type: string
    default: "release"
    # values:
    #   - dev
    #   - preview
    #   - release

  - name: baseimgVersion
    displayName: Base Image Version
    type: string
    default: "*.*.*"

  - name: rpmsVersion
    displayName: RPM Version
    type: string
    default: "*.*.*"

  - name: clones
    type: number
    default: 1
    displayName: Number of clones to create

  # The AZL4 base VHDX is sourced from the Azure Linux preview gallery's
  # backing storage account. The pipeline service connection at
  # $(BLOB_SERVICE_CONNECTION) must have `Storage Blob Data Reader` on
  # this account. See tests/images/SERVICE-CONNECTION-RUNBOOK.md.
  - name: blobStorageAccount
    type: string
    default: "azlpubdev2mruiyvi"

  - name: blobContainer
    type: string
    default: "images-dev"

  - name: blobSubscription
    type: string
    # Subscription where the storage account lives. The SC's default
    # subscription may differ — we explicitly set context before download.
    default: "e4ab81f8-030f-4593-a8f2-3ea2c7630a19"

  - name: blobServiceConnection
    type: string
    # NB: this must be a service connection that exists in the ADO project.
    # Created manually by trident infra team.
    default: "trident-azl4-blob-reader"

steps:
  - template: ../common_tasks/avoid-pypi-usage.yml

  - template: common/sfi-enforce-isolation-with-etc-hosts.yaml@platform-pipelines

  - script: |
      set -eux

      if which tdnf; then
        # nss-tools provides certutil while pesign provides efikeygen & pesign,
        # which are required for producing a signed image to enable SecureBoot
        sudo tdnf install -y veritysetup nss-tools pesign
        sudo systemctl start docker
      else
        # Ubuntu is used for building and testing of VM images suitable for
        # servicing by Trident
        sudo apt install -y createrepo-c swtpm
      fi
      az extension add --name azure-devops
    displayName: "Install native dependencies"
    retryCountOnTaskFailure: 3

  - bash: |
      ./tests/images/testimages.py show-image ${{ parameters.imageName }} base-image --devops-var baseImageType
    displayName: "Get Image Info"
    workingDirectory: ${{ parameters.tridentSourceDirectory }}

  - bash: |
      echo "Image type: $(baseImageType)"
      echo "Defined variables:"
      env | sort
    displayName: "Show defined variables"

  - template: common/mic-download-template.yaml@platform-pipelines
    parameters:
      buildType: ${{ parameters.micBuildType }}
      arch: ${{ parameters.architecture }}
      micVersion: ${{ parameters.micVersion }}
  
# Note: DHCP packages are not being installed in this image template.
# If needed use template download-dhcp.yml on test-images.

  - ${{ if ne(parameters.azureLinuxVersion, '4.0-preview') }}:
    - template: common/base-images-download-template.yaml@platform-pipelines
      parameters:
        buildType: ${{ parameters.baseimgBuildType }}
        baseImageType: $(baseImageType)
        imageVersion: ${{ parameters.baseimgVersion }}
        azureLinuxVersion: ${{ parameters.azureLinuxVersion }}

    # For dev builds, the RPMs are not necessarily published, so download them here. The
    # parameter is set based on a runtime variable, so we cannot use ${{ if }}, so the
    # template is always run and contains logic to skip if not needed.
    - template: common/rpms-download-template.yaml@platform-pipelines
      parameters:
        rpmsVersion: ${{ parameters.rpmsVersion }}
        azureLinuxVersion: ${{ parameters.azureLinuxVersion }}
        runtimeBuildType: ${{ parameters.baseimgBuildType }}
  - ${{ else }}:
    # Download the AZL4 base VHDX from the preview gallery's backing storage.
    # Authenticates via the federated identity attached to the service
    # connection — no storage keys handled here.
    #
    # The SC's default subscription (Polar_ImageTools_Staging) differs from
    # the storage account's subscription (ControlTower_Test). We must switch
    # context so `az storage blob list` resolves the account correctly.
    - task: AzureCLI@2
      displayName: "Download AZL4 base VHDX from blob"
      inputs:
        azureSubscription: ${{ parameters.blobServiceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: ${{ parameters.tridentSourceDirectory }}
        inlineScript: |
          set -euxo pipefail
          az account set --subscription "${{ parameters.blobSubscription }}"
          python3 ./tests/images/testimages.py download-image azl4_qemu_guest \
              --blob-storage-account "${{ parameters.blobStorageAccount }}" \
              --blob-container "${{ parameters.blobContainer }}"
          ls -la artifacts/azl4_qemu_guest.vhdx
          mkdir -p $(Build.ArtifactStagingDirectory)/images
          mv artifacts/azl4_qemu_guest.vhdx $(Build.ArtifactStagingDirectory)/images/
          ls -la $(Build.ArtifactStagingDirectory)/images/azl4_qemu_guest.vhdx

  - bash: |
      set -ex

      # Move base VHDX to artifacts/ (builder expects artifacts/*.vhdx)
      mkdir -p artifacts
      if ls "$(Build.ArtifactStagingDirectory)/images" | grep -q ".*\.vhdx$"; then
        mv $(Build.ArtifactStagingDirectory)/images/*.vhdx artifacts/
        rm -rf $(Build.ArtifactStagingDirectory)/images
      else
        echo "No base image found"
        exit 1
      fi

      # Move dev RPM overrides to artifacts/rpm-overrides/
      if ls "$(Build.ArtifactStagingDirectory)/rpms/" 2>/dev/null | grep -q "rpms.tar.gz"; then
        mkdir -p artifacts/rpm-overrides
        tar -xvf $(Build.ArtifactStagingDirectory)/rpms/rpms.tar.gz \
          --strip-components=2 \
          -C artifacts/rpm-overrides
        rm $(Build.ArtifactStagingDirectory)/rpms/rpms.tar.gz
      fi

      # Move Trident RPMs to bin/RPMS/ (builder expects bin/RPMS/*.rpm)
      if [ -d "$(Build.ArtifactStagingDirectory)/trident" ]; then
        mkdir -p bin/RPMS
        find "$(Build.ArtifactStagingDirectory)/trident" -name '*.rpm' -exec mv {} bin/RPMS/ \;
        rm -rf "$(Build.ArtifactStagingDirectory)/trident"
      fi
    displayName: "Prepare and move requirements"
    workingDirectory: ${{ parameters.tridentSourceDirectory }}

  - bash: |
      set -ex

      EXTRA_ARGS=""

      if [[ "${{ parameters.micBuildType }}" == "dev" ]]; then
        EXTRA_ARGS+=" --container imagecustomizer:dev"
      fi

      python3 ./tests/images/testimages.py build \
          "${{ parameters.imageName }}" $EXTRA_ARGS \
          --output-dir $(ob_outputDirectory) \
          --no-download \
          --clones ${{ parameters.clones }}
    displayName: "Build ${{ parameters.imageName }}"
    workingDirectory: ${{ parameters.tridentSourceDirectory }}

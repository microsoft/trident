# TODO(azl4-release): Drop this template once AZL4 ships in a released MIC
# container at mcr.microsoft.com/azurelinux/imagecustomizer. At that point
# the standard build-image-template.yml path can be used with --container
# pointing at the released tag. Tracking: tests/images/mic-azl4-pin/README.md
#
# Side-task that builds a pinned imagecustomizer container and osmodifier
# binary from microsoft/azurelinux-image-tools at a known-working SHA. Output
# is loaded into the local Docker daemon as ${{ parameters.containerTag }}
# and the osmodifier binary is staged where the testimage YAML expects it.

parameters:
  - name: tridentSourceDirectory
    type: string

  - name: containerTag
    type: string
    default: "imagecustomizer:azl4-pinned"

steps:
  - bash: |
      set -euxo pipefail

      # Source the pin from tests/images/mic-azl4-pin/PINNED.env so
      # this template and the equivalent local script
      # (mic-azl4-pin/build-pinned-mic.sh) cannot drift.
      PIN_ENV="${{ parameters.tridentSourceDirectory }}/tests/images/mic-azl4-pin/PINNED.env"
      if [ ! -f "$PIN_ENV" ]; then
        echo "ERROR: $PIN_ENV not found"
        exit 1
      fi
      # shellcheck disable=SC1090
      . "$PIN_ENV"
      : "${MIC_PIN_URL:?PINNED.env missing MIC_PIN_URL}"
      : "${MIC_PIN_SHA:?PINNED.env missing MIC_PIN_SHA}"
      : "${BUILDX_VER:?PINNED.env missing BUILDX_VER}"

      # The OneBranch AzL3 runner has azure-cli, git, docker, and go pre-installed
      # but docker daemon may be inactive and buildx is not in the plugin path.
      # The Ubuntu runner has docker but not docker buildx by default either.
      #
      # TODO(azl4-release): drop the whole prerequisite-staging block once
      # the runner image ships docker buildx out of the box (or once we
      # stop needing to build the MIC container ourselves).
      if which tdnf >/dev/null 2>&1; then
        sudo systemctl start docker || true
        # `golang` may already be installed via capability match; tolerate
        # "already installed" + tolerate missing if a newer base image
        # renamed the package.
        sudo tdnf install -y golang || true
      else
        sudo apt-get update
        sudo apt-get -y install golang-go docker.io
        sudo systemctl start docker || true
        # Ubuntu runner may lack az CLI. Install via Microsoft's apt repo
        # with a checked-in keyring instead of `curl | sudo bash`, which
        # would let an aka.ms redirect change or CDN compromise execute
        # arbitrary code as root on the agent.
        if ! command -v az >/dev/null 2>&1; then
          sudo apt-get -y install ca-certificates curl apt-transport-https lsb-release gnupg
          # Microsoft apt repo signing key. URL is the published key
          # location; key fingerprint is verified by apt at install time.
          curl -sLS https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor --yes -o /etc/apt/keyrings/microsoft.gpg
          sudo chmod go+r /etc/apt/keyrings/microsoft.gpg
          # shellcheck disable=SC1091
          . /etc/os-release
          AZ_REPO="${VERSION_CODENAME}"
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/microsoft.gpg] \
https://packages.microsoft.com/repos/azure-cli/ $AZ_REPO main" \
            | sudo tee /etc/apt/sources.list.d/azure-cli.list >/dev/null
          sudo apt-get update
          sudo apt-get -y install azure-cli
        fi
      fi

      # Install docker buildx (required for the BuildKit secret-mount in
      # the upstream MIC Dockerfile). Neither AzL3 nor Ubuntu runner has
      # it by default. Pinned to a release tag for reproducibility AND
      # verified against the release's published checksums.txt so a
      # tag-move on the upstream GitHub release cannot substitute a
      # different binary.
      if ! docker buildx version >/dev/null 2>&1; then
        mkdir -p ~/.docker/cli-plugins
        TMPDIR="$(mktemp -d)"
        curl -fsSL \
          "https://github.com/docker/buildx/releases/download/${BUILDX_VER}/buildx-${BUILDX_VER}.linux-amd64" \
          -o "$TMPDIR/docker-buildx"
        curl -fsSL \
          "https://github.com/docker/buildx/releases/download/${BUILDX_VER}/checksums.txt" \
          -o "$TMPDIR/checksums.txt"
        ( cd "$TMPDIR" && \
          grep "buildx-${BUILDX_VER}.linux-amd64\$" checksums.txt \
            | sed "s|buildx-${BUILDX_VER}.linux-amd64|docker-buildx|" \
            | sha256sum -c - )
        chmod +x "$TMPDIR/docker-buildx"
        mv "$TMPDIR/docker-buildx" ~/.docker/cli-plugins/docker-buildx
        rm -rf "$TMPDIR"
      fi
      docker buildx version
    displayName: "Install pinned-MIC build prerequisites"
    retryCountOnTaskFailure: 3

  - bash: |
      set -euxo pipefail

      # Source the pin again (each step is a fresh shell).
      PIN_ENV="${{ parameters.tridentSourceDirectory }}/tests/images/mic-azl4-pin/PINNED.env"
      # shellcheck disable=SC1090
      . "$PIN_ENV"
      : "${MIC_PIN_URL:?PINNED.env missing MIC_PIN_URL}"
      : "${MIC_PIN_SHA:?PINNED.env missing MIC_PIN_SHA}"

      WORKDIR="$(Agent.TempDirectory)/azl4-mic-pinned"
      rm -rf "$WORKDIR"
      git clone --filter=blob:none "$MIC_PIN_URL" "$WORKDIR"
      cd "$WORKDIR"
      git checkout "$MIC_PIN_SHA"

      # Build the imagecustomizer Go binary.
      ( cd toolkit/tools/imagecustomizer && go build -o ../../out/tools/imagecustomizer . )

      # TODO(azl4-release): drop this LICENSES staging once upstream's
      # build-container.sh doesn't require it.
      mkdir -p toolkit/out/LICENSES
      cp LICENSE toolkit/out/LICENSES/ 2>/dev/null || true

      # Build the container with BuildKit (required for the secret-mount in
      # upstream's Dockerfile).
      DOCKER_BUILDKIT=1 ./toolkit/tools/imagecustomizer/container/build-container.sh \
        -t "${{ parameters.containerTag }}" -a amd64

      # Build the osmodifier binary from the same pinned source, staged where
      # tests/images/trident-vm-testimage/base/updateimg-grub-azl4.yaml
      # additionalFiles entry expects it.
      #
      # TODO(azl4-osmodifier-rpm): replace this bin-copy with an osmodifier
      # RPM install once one is available for AZL4. Today there's no RPM,
      # so we ship the binary inline via additionalFiles. See PR-4 for the
      # corresponding hostname carry-over migration off osmodifier, which
      # is gradually whittling down what osmodifier is needed for.
      OSMOD_DEST="${{ parameters.tridentSourceDirectory }}/tests/images/trident-vm-testimage/base/osmodifier-bin"
      mkdir -p "$OSMOD_DEST"
      ( cd toolkit/tools/osmodifier && go build -o "$OSMOD_DEST/osmodifier" . )
      chmod +x "$OSMOD_DEST/osmodifier"

      echo "Pinned MIC container loaded:"
      docker images | grep "${{ parameters.containerTag }}" || true
      echo "osmodifier staged at: $OSMOD_DEST/osmodifier"
    displayName: "Build pinned MIC container and osmodifier"
    workingDirectory: ${{ parameters.tridentSourceDirectory }}

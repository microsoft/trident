parameters:
  - name: updateIterationCount
    displayName: "Number of updates to test"
    type: number
    default: 1

  - name: rollbackTesting
    displayName: "Run rollback test"
    type: boolean
    default: true

  - name: workers
    displayName: "Number of workers in this batch"
    type: number
    default: 1

  - name: workerOffset
    displayName: "Offset for global worker numbering (batch_index * workers_per_batch)"
    type: number
    default: 0

  - name: batchId
    displayName: "Batch identifier for unique job naming"
    type: string
    default: ""

  - name: updateCheckTimeoutInMinutes
    displayName: "Timeout for checking target OS deployment in minutes"
    type: number
    default: 25

  - name: verboseLogging
    displayName: "Enable verbose logging"
    type: boolean
    default: false

  - name: platform
    displayName: Test platform
    type: string
    values:
      - qemu
      - azure

  - name: flavor
    displayName: Image flavor
    type: string
    values:
      - qemu
      - azure
      - uki

  - name: pool
    displayName: Agent pool
    type: string
    default: "trident-ubuntu-1es-pool-eastus2"

  # Define whether to run tests using SecureBoot or not. This impacts both
  # which tests run (many encryption-related tests only run with SecureBoot enabled) and
  # how the test machines are configured.
  - name: testSecureBoot
    type: boolean
    default: true

  - name: dependsOnPublishAzureImage
    type: boolean
    default: false

jobs:
  - job: UpdateTesting_${{ parameters.flavor }}${{ parameters.batchId }}
    displayName: Update Testing - ${{ parameters.flavor }}${{ parameters.batchId }}
    timeoutInMinutes: ${{ parameters.updateCheckTimeoutInMinutes }}
    pool:
      type: linux
      name: ${{ parameters.pool }}
      hostArchitecture: amd64
    strategy:
      parallel: ${{ parameters.workers }}
    ${{ if eq(parameters.dependsOnPublishAzureImage, true) }}:
      dependsOn:
        - PublishAzureImage

    variables:
      ob_outputDirectory: /tmp/deployment_logs_${{ parameters.flavor }}
      ob_artifactBaseName: "update-testing-${{ parameters.flavor }}-$(System.JobPositionInPhase)"
      TEST_RESOURCE_GROUP: trident-vm-servicing-validation-$(Build.BuildId)-$(System.JobPositionInPhase)
      WORKER_OFFSET: ${{ parameters.workerOffset }}

    steps:
      - template: ../common_tasks/checkout_trident.yml
      - bash: |
          GLOBAL_POS=$(( $WORKER_OFFSET + $(System.JobPositionInPhase) ))
          PADDED=$(printf '%03d' $GLOBAL_POS)
          echo "##vso[task.setvariable variable=ob_artifactBaseName;]update-testing-${{ parameters.flavor }}-${PADDED}"
          echo "##vso[task.setvariable variable=TEST_RESOURCE_GROUP;]trident-vm-servicing-validation-$(Build.BuildId)-${PADDED}"
        displayName: "Set variables"

      - ${{ if eq(parameters.platform, 'azure') }}:
          - task: DownloadPipelineArtifact@2
            inputs:
              buildType: current
              artifactName: image-${{ parameters.platform }}-base
              targetPath: "$(Build.ArtifactStagingDirectory)/"
            displayName: Download Base Image

      - ${{ if eq(parameters.platform, 'qemu') }}:
          - task: DownloadPipelineArtifact@2
            inputs:
              buildType: current
              artifactName: image-${{ parameters.flavor }}-base
              targetPath: "$(Build.ArtifactStagingDirectory)/"
            displayName: Download Base Image

      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: current
          artifactName: image-${{ parameters.flavor }}-update-a
          targetPath: "$(Build.ArtifactStagingDirectory)/update-a"
        displayName: Download Update Image A

      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: current
          artifactName: image-${{ parameters.flavor }}-update-b
          targetPath: "$(Build.ArtifactStagingDirectory)/update-b"
        displayName: Download Update Image B

      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: current
          artifactName: ssh-keys
          targetPath: "$(Build.ArtifactStagingDirectory)/ssh"
        displayName: Download SSH Keys

      - task: DownloadPipelineArtifact@2
        displayName: "Download go-tools"
        inputs:
          buildType: current
          artifactName: "go-tools"
          patterns: |
            netlisten
            storm-trident
          targetPath: "$(TRIDENT_SOURCE_DIR)/bin"

      - bash: |
          set -eux
          chmod +x $(TRIDENT_SOURCE_DIR)/bin/netlisten
          chmod +x $(TRIDENT_SOURCE_DIR)/bin/storm-trident
          cp $(Build.ArtifactStagingDirectory)/ssh/id_rsa* ~/.ssh/
          chmod -R 700 ~/.ssh/
          mkdir -p $(ob_outputDirectory)
        displayName: Set up SSH Keys and setup output directory

      - ${{ if eq(parameters.platform, 'qemu') }}:
        - bash: |
            set -eux
            sudo apt update
            sudo apt install -y imagemagick
          displayName: "Install imagemagick for libvirt screenshot capture"

        - bash: |
            set -eux

            # Disable virtlogd rollover by setting max_size to 0
            cat /etc/libvirt/virtlogd.conf
            echo "max_size = 0" | sudo tee -a /etc/libvirt/virtlogd.conf
            cat /etc/libvirt/virtlogd.conf
            sudo systemctl restart virtlogd.socket
          displayName: "Disable virtlogd log rollover"

      - bash: |
          echo "##vso[task.setvariable variable=STORM_SCENARIO_FINISHED;]false"
        displayName: "Initialize STORM_SCENARIO_FINISHED=false"

      - bash: |
          set -eux

          FLAGS="-a"
          if [ "${{ parameters.verboseLogging }}" == "True" ]; then
            FLAGS="$FLAGS --verbose"
          fi
          if [ "${{ parameters.flavor }}" != "uki" ]; then
            if [[ "${{ parameters.testSecureBoot }}" == 'True' ]]; then
              FLAGS="$FLAGS --secure-boot"
            fi
          fi
          if [ "${{ parameters.rollbackTesting }}" == "True" ]; then
            FLAGS="$FLAGS --rollback-retry-count ${{ parameters.updateIterationCount }} --rollback"
          fi
          set +x
          echo "##vso[task.setvariable variable=STORM_FLAGS;]$FLAGS"
        displayName: "Set flags"

      - ${{ if eq(parameters.platform, 'azure') }}:
          - task: AzureCLI@2
            inputs:
              azureSubscription: trident-servicing-test
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -eux

                cd $(TRIDENT_SOURCE_DIR)
                ./bin/storm-trident run servicing $(STORM_FLAGS) \
                  --artifacts-dir $(Build.ArtifactStagingDirectory) \
                  --output-path $(ob_outputDirectory) \
                  --subscription $(SUBSCRIPTION) \
                  --image-definition $(IMAGE_DEFINITION) \
                  --storage-account $(STORAGE_ACCOUNT) \
                  --storage-account-resource-group $(RESOURCE_GROUP) \
                  --test-resource-group $(TEST_RESOURCE_GROUP) \
                  --platform ${{ parameters.platform }} \
                  --subnet-id $(SUBNET_ID) \
                  --ssh-private-key-path $(SSH_PRIVATE_KEY_PATH) \
                  --ssh-public-key-path $(SSH_PUBLIC_KEY_PATH) \
                  --retry-count ${{ parameters.updateIterationCount }} \
                  --update-port-a 8123 --update-port-b 8124 \
                  --build-id $(Build.BuildId) \
                  --use-private-ip-address \
                  --force-cleanup
                set +x
                echo "##vso[task.setvariable variable=STORM_SCENARIO_FINISHED;]true"
            displayName: "Servicing test (${{ parameters.platform }})"
            env:
              AZCOPY_AUTO_LOGIN_TYPE: "AZCLI"
          - task: AzureCLI@2
            inputs:
              azureSubscription: trident-servicing-test
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -eux

                cd $(TRIDENT_SOURCE_DIR)
                # If platform is azure AND the test failed to finish, run cleanup to
                # ensure there are no azure resources left behind
                if [ "${STORM_SCENARIO_FINISHED}" != "true" ]; then
                  FLAGS="-a"
                  if [ "${{ parameters.verboseLogging }}" == "True" ]; then
                    FLAGS="$FLAGS --verbose"
                  fi

                  ./bin/storm-trident run servicing -a $FLAGS \
                    --output-path $(ob_outputDirectory) \
                    --subscription $(SUBSCRIPTION) \
                    --test-resource-group $(TEST_RESOURCE_GROUP) \
                    --platform ${{ parameters.platform }} \
                    --test-case-to-run cleanup-vm
                fi
            displayName: "Cleanup even if timeout"
            retryCountOnTaskFailure: 3
            timeoutInMinutes: 20
            condition: always()

      - ${{ else }}:
          - bash: |
              set -eux
              sudo ./bin/storm-trident run servicing $(STORM_FLAGS) \
                --artifacts-dir $(Build.ArtifactStagingDirectory) \
                --output-path $(ob_outputDirectory) \
                --platform ${{ parameters.platform }} \
                --ssh-private-key-path $(SSH_PRIVATE_KEY_PATH) \
                --ssh-public-key-path $(SSH_PUBLIC_KEY_PATH) \
                --retry-count ${{ parameters.updateIterationCount }} \
                --build-id $(Build.BuildId) \
                --use-private-ip-address \
                --force-cleanup
              set +x
              echo "##vso[task.setvariable variable=STORM_SCENARIO_FINISHED;]true"
            displayName: "Servicing test (${{ parameters.platform }})"
            workingDirectory: $(TRIDENT_SOURCE_DIR)

      - bash: |
          set -eux

          if [ "${{ parameters.platform }}" == "qemu" ]; then
              sudo zstd -T0 $(Build.ArtifactStagingDirectory)/booted.qcow2
              sudo mv $(Build.ArtifactStagingDirectory)/booted.qcow2.zst $(ob_outputDirectory)/
          fi
          # TODO: use
          # https://learn.microsoft.com/en-us/azure/virtual-machines/linux/download-vhd?tabs=azure-cli
          # for Azure images
        workingDirectory: $(TRIDENT_SOURCE_DIR)
        condition: failed()
        displayName: "Publish logs and OS disk on failure"
        timeoutInMinutes: 5

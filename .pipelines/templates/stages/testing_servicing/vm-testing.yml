parameters:
  - name: testingRun
    displayName: "Download prebuilt test artifacts"
    type: boolean
    default: false

  - name: baseimgAzlVersion
    displayName: Base Image AZL version
    type: string
    default: "3.0"

  - name: updateIterationCount
    displayName: "Number of updates to test"
    type: number
    default: 3

  - name: rollbackTesting
    displayName: "Run rollback test"
    type: boolean
    default: true

  - name: workers
    displayName: "Number of workers to use"
    type: number
    default: 1

  - name: workersPerBatch
    displayName: "Max workers per batch (splits large worker counts into multiple phases)"
    type: number
    default: 64

  - name: workerBatches
    displayName: "Worker batch definitions (offset and size for each batch)"
    type: object
    default:
      - id: ""
        offset: 0
        size: 1

  - name: updateCheckTimeoutInMinutes
    displayName: "Timeout for checking target OS deployment in minutes"
    type: number
    default: 30

  - name: verboseLogging
    displayName: "Enable verbose logging"
    type: boolean
    default: false

  - name: includeQemu
    displayName: "Include qemu testing"
    type: boolean
    default: false

  - name: includeAzure
    displayName: "Include Azure testing"
    type: boolean
    default: false

  - name: includeUKI
    displayName: "Include UKI testing"
    type: boolean
    default: false

  - name: micBuildType
    displayName: MIC Build Type
    type: string
    values:
      - dev
      - preview
      - release
    default: release

  - name: micVersion
    displayName: MIC Version
    type: string
    default: "*.*.*"

  - name: dependsOnStage
    type: string
    default: ""

  # Define whether to run tests using SecureBoot or not. This impacts both
  # which tests run (many encryption-related tests only run with SecureBoot enabled) and
  # how the test machines are configured.
  - name: testSecureBoot
    type: boolean
    default: true

stages:
  - ${{ if eq(parameters.testingRun, false) }}:
      - stage: PrepareSSHKeys
        displayName: Prepare SSH Keys
        jobs:
          - template: generate-ssh-keys.yml

      - ${{ if eq(parameters.includeQemu, true) }}:
          - stage: BuildImagesQemu
            displayName: Build Base and Update Images for QEMU
            dependsOn:
              - PrepareSSHKeys
              - GetTridentBinaries_rpms_amd64
              - ${{ if ne(parameters.dependsOnStage, '') }}:
                  - ${{ parameters.dependsOnStage }}

            jobs:
              - template: ../trident_images/build-images-batch.yml
                parameters:
                  batchLabel: "qemu"
                  baseimgType: qemu_guest
                  baseimgAzlVersion: ${{ parameters.baseimgAzlVersion }}
                  micBuildType: ${{ parameters.micBuildType }}
                  micVersion: ${{ parameters.micVersion }}
                  useStagedSshKeys: true
                  images:
                    - label: "qemu-base"
                      makeTarget: "artifacts/trident-vm-grub-verity-testimage.qcow2"
                    - label: "qemu-update-a"
                      makeTarget: "artifacts/trident-vm-grub-verity-testimage.cosi"
                    - label: "qemu-update-b"
                      makeTarget: "artifacts/trident-vm-grub-verity-testimage.cosi"

      - ${{ if eq(parameters.includeAzure, true) }}:
          - stage: BuildImagesAzure
            displayName: Build Base and Update Images for Azure
            dependsOn:
              - PrepareSSHKeys
              - GetTridentBinaries_rpms_amd64
              - ${{ if ne(parameters.dependsOnStage, '') }}:
                  - ${{ parameters.dependsOnStage }}

            jobs:
              - template: ../trident_images/build-images-batch.yml
                parameters:
                  batchLabel: "azure"
                  baseimgType: core_selinux
                  baseimgAzlVersion: ${{ parameters.baseimgAzlVersion }}
                  micBuildType: ${{ parameters.micBuildType }}
                  micVersion: ${{ parameters.micVersion }}
                  images:
                    - label: "azure-base"
                      makeTarget: "artifacts/trident-vm-grub-verity-azure-testimage.vhd"
                    - label: "azure-update-a"
                      makeTarget: "artifacts/trident-vm-grub-verity-azure-testimage.cosi"
                    - label: "azure-update-b"
                      makeTarget: "artifacts/trident-vm-grub-verity-azure-testimage.cosi"

      - ${{ if eq(parameters.includeUKI, true) }}:
          - stage: BuildImagesUKI
            displayName: Build Base and Update Images for UKI
            dependsOn:
              - PrepareSSHKeys
              - GetTridentBinaries_rpms_amd64
              - ${{ if ne(parameters.dependsOnStage, '') }}:
                  - ${{ parameters.dependsOnStage }}

            jobs:
              - template: ../trident_images/build-images-batch.yml
                parameters:
                  batchLabel: "uki"
                  baseimgType: qemu_guest
                  baseimgAzlVersion: ${{ parameters.baseimgAzlVersion }}
                  micBuildType: ${{ parameters.micBuildType }}
                  micVersion: ${{ parameters.micVersion }}
                  useStagedSshKeys: true
                  images:
                    - label: "uki-base"
                      makeTarget: "artifacts/trident-vm-usr-verity-testimage.qcow2"
                    - label: "uki-update-a"
                      makeTarget: "artifacts/trident-vm-usr-verity-testimage.cosi"
                    - label: "uki-update-b"
                      makeTarget: "artifacts/trident-vm-usr-verity-testimage.cosi"

  - stage: ServicingTesting
    displayName: Servicing Testing
    dependsOn:
      - ${{ if eq(parameters.testingRun, true) }}:
          - DownloadTestingElements
      - ${{ else }}:
          - BuildingTools
          - ${{ if eq(parameters.includeQemu, true) }}:
              - BuildImagesQemu
          - ${{ if eq(parameters.includeAzure, true) }}:
              - BuildImagesAzure
          - ${{ if eq(parameters.includeUKI, true) }}:
              - BuildImagesUKI

    variables:
      - group: servicing_testing_params
      - name: SSH_PRIVATE_KEY_PATH
        value: "$HOME/.ssh/id_rsa"
      - name: SSH_PUBLIC_KEY_PATH
        value: "$(SSH_PRIVATE_KEY_PATH).pub"
      - name: IMAGE_DEFINITION
        value: "trident-vm-grub-verity-testimage-$(System.DefinitionId)"

    jobs:
      - ${{ if eq(parameters.includeQemu, true) }}:
          - ${{ each batch in parameters.workerBatches }}:
              - template: testing-template.yml
                parameters:
                  updateIterationCount: ${{ parameters.updateIterationCount }}
                  rollbackTesting: ${{ parameters.rollbackTesting }}
                  workers: ${{ batch.size }}
                  workerOffset: ${{ batch.offset }}
                  batchId: ${{ batch.id }}
                  updateCheckTimeoutInMinutes: ${{ parameters.updateCheckTimeoutInMinutes }}
                  verboseLogging: ${{ parameters.verboseLogging }}
                  platform: qemu
                  flavor: qemu
                  testSecureBoot: ${{ parameters.testSecureBoot }}

      - ${{ if eq(parameters.includeAzure, true) }}:
          # Publish the base image once for all azure workers to share
          - ${{ if gt(parameters.workers, 1) }}:
              - job: PublishAzureImage
                displayName: Publish Azure Image
                timeoutInMinutes: 20
                pool:
                  type: linux
                  name: trident-ubuntu-official-1es-pool-eastus2
                  hostArchitecture: amd64
                variables:
                  ob_outputDirectory: /tmp/logs
                steps:
                  - template: ../common_tasks/checkout_trident.yml
                  - task: DownloadPipelineArtifact@2
                    displayName: "Download go-tools: storm"
                    inputs:
                      buildType: current
                      artifactName: "go-tools"
                      patterns: |
                        storm-trident
                      targetPath: "$(TRIDENT_SOURCE_DIR)/bin"
                  - bash: |
                      set -eux
                      chmod +x $(TRIDENT_SOURCE_DIR)/bin/storm-trident
                      mkdir -p $(ob_outputDirectory)
                    displayName: Make storm executable and create output directory
                  - task: DownloadPipelineArtifact@2
                    inputs:
                      buildType: current
                      artifactName: images-azure
                      itemPattern: "azure-base/**"
                      targetPath: "$(Build.ArtifactStagingDirectory)/"
                    displayName: Download Base Image
                  - bash: |
                      set -eux
                      mv $(Build.ArtifactStagingDirectory)/azure-base/* $(Build.ArtifactStagingDirectory)/
                      rmdir $(Build.ArtifactStagingDirectory)/azure-base
                    displayName: Flatten base image directory
                  - task: AzureCLI@2
                    inputs:
                      azureSubscription: trident-servicing-test
                      scriptType: bash
                      scriptLocation: scriptPath
                      scriptPath: $(TRIDENT_SOURCE_DIR)/.pipelines/scripts/svc/publish-azure-image.sh
                    displayName: Publish Base Image
                    env:
                      TRIDENT_SOURCE_DIR: $(TRIDENT_SOURCE_DIR)
                      PLATFORM: azure
                      ARTIFACTS: $(Build.ArtifactStagingDirectory)
                      BUILD_ID: $(Build.BuildId)
                      OB_OUTPUT_DIR: $(ob_outputDirectory)
                      AZCOPY_AUTO_LOGIN_TYPE: "AZCLI"
          - ${{ each batch in parameters.workerBatches }}:
              - template: testing-template.yml
                parameters:
                  updateIterationCount: ${{ parameters.updateIterationCount }}
                  rollbackTesting: ${{ parameters.rollbackTesting }}
                  workers: ${{ batch.size }}
                  workerOffset: ${{ batch.offset }}
                  batchId: ${{ batch.id }}
                  updateCheckTimeoutInMinutes: ${{ parameters.updateCheckTimeoutInMinutes }}
                  verboseLogging: ${{ parameters.verboseLogging }}
                  platform: azure
                  flavor: azure
                  pool: trident-ubuntu-official-1es-pool-eastus2
                  testSecureBoot: ${{ parameters.testSecureBoot }}
                  dependsOnPublishAzureImage: ${{ gt(parameters.workers, 1) }}

      - ${{ if eq(parameters.includeUKI, true) }}:
          - ${{ each batch in parameters.workerBatches }}:
              - template: testing-template.yml
                parameters:
                  updateIterationCount: ${{ parameters.updateIterationCount }}
                  rollbackTesting: ${{ parameters.rollbackTesting }}
                  workers: ${{ batch.size }}
                  workerOffset: ${{ batch.offset }}
                  batchId: ${{ batch.id }}
                  updateCheckTimeoutInMinutes: ${{ parameters.updateCheckTimeoutInMinutes }}
                  verboseLogging: ${{ parameters.verboseLogging }}
                  platform: qemu
                  flavor: uki
                  testSecureBoot: ${{ parameters.testSecureBoot }}

parameters:
  - name: buildPurpose
    type: string
    default: "post_merge"
    values:
      - daily
      - pullrequest
      - post_merge
      - validation
      - weekly

  - name: testingRun
    displayName: "Download prebuilt test artifacts"
    type: boolean
    default: false

  - name: runtimeEnv
    displayName: "Runtime environment (host vs container)"
    type: string
    default: "host"
    values:
      - host
      - container

  # Define whether to run tests using SecureBoot or not. This impacts both
  # which tests run (many encryption-related tests only run with SecureBoot enabled) and
  # how the test machines are configured.
  - name: testSecureBoot
    type: boolean
    default: true

  # Define which service connection to use for accessing ACR.
  #   `maritimus-dev-acr-write-umi` is the service connection for the Polar SC
  #   `trident-dev-acr-write-umi-ECF` is the service connection for the ECF SC
  - name: acrServiceConnectionName
    type: string
    default: trident-dev-acr-write-umi-ECF
    values:
      - maritimus-dev-acr-write-umi
      - trident-dev-acr-write-umi-ECF

stages:
  - stage: DefineTests_VM_${{ parameters.runtimeEnv }}
    displayName: Test List for VM:${{ parameters.runtimeEnv }}
    jobs:
      - template: ../testing_common/get-tests.yml
        parameters:
          buildPurpose: ${{ parameters.buildPurpose }}
          deploymentEnvironment: virtualMachine
          runtimeEnv: ${{ parameters.runtimeEnv }}
          testSecureBoot: ${{ parameters.testSecureBoot }}

  - stage: DeploymentTesting_${{ parameters.runtimeEnv }}
    displayName: Deployment VM ${{ parameters.runtimeEnv }} Testing
    dependsOn:
      - DefineTests_VM_${{ parameters.runtimeEnv }}
      - ${{ if eq(parameters.testingRun, true) }}:
          - DownloadTestingElements
      - ${{ else }}:
          - BuildingTools
          - ${{ if eq(parameters.runtimeEnv, 'container') }}:
              - BuildTridentContainerImage
              - TridentTestImg_trident_container_installer
              - TridentTestImg_trident_container_testimage
              - TridentTestImg_trident_container_verity_testimage
              - TridentTestImg_trident_container_usrverity_testimage
          - ${{ else }}:
              - TridentTestImg_trident_split_installer
              - TridentTestImg_trident_installer
              - TridentTestImg_trident_testimage
              - TridentTestImg_trident_verity_testimage
              - TridentTestImg_trident_usrverity_testimage

    jobs:
      - job: Testing
        timeoutInMinutes: 50
        pool:
          type: linux
          name: trident-ubuntu-1es-pool-eastus2
          hostArchitecture: amd64

        strategy:
          matrix: $[ stageDependencies.DefineTests_VM_${{ parameters.runtimeEnv }}.DefineTests.outputs['setConfigurations.matrixConfigurations'] ]

        variables:
          # Sourced from the matrix
          - name: tridentConfigurationName
            value: $(configuration)

          - name: tridentConfigPath
            value: tests/e2e_tests/trident_configurations/$(tridentConfigurationName)

          - ${{ if eq(parameters.runtimeEnv, 'container') }}:
              - name: installerISOName
                value: trident-container-installer
              - name: testImageName
                value: trident-container-testimage
              - name: verityTestImageName
                value: trident-container-verity-testimage
              - name: usrVerityTestImageName
                value: trident-container-usrverity-testimage
              - name: downloadTridentContainer
                value: true
          - ${{ else }}:
              - name: installerISOName
                value: trident-installer
              - name: testImageName
                value: trident-testimage
              - name: verityTestImageName
                value: trident-verity-testimage
              - name: usrVerityTestImageName
                value: trident-usrverity-testimage
              - name: downloadTridentContainer
                value: false

          - name: ob_outputDirectory
            value: /tmp/deployment_logs
          - name: ob_artifactBaseName
            value: $(tridentConfigurationName)_${{ parameters.runtimeEnv }}_deployment_log_$(System.JobAttempt)

          - name: netlaunchPort
            value: 4000

          # Provides: ACR_NAME
          - group: trident_e2e_params

        steps:
          - template: ../common_tasks/checkout_trident.yml

          - bash: |
              if [ ${{ variables['tridentConfigurationName'] }} == 'split' ]; then
                splitInstallerIsoName="trident-split-installer"
                echo "setting variable.installerISOName to $splitInstallerIsoName"
                echo "##vso[task.setvariable variable=installerISOName]$splitInstallerIsoName"
              fi
            displayName: Special handling for split test

          # Download all test images
          - template: ../testing_common/download-test-images.yml
            parameters:
              installerISO: $(installerISOName)
              tridentTestImage: ${{ variables.testImageName }}
              tridentTestImageVerity: ${{ variables.verityTestImageName }}
              downloadTridentContainer: ${{ variables.downloadTridentContainer }}
              tridentTestImageUsrVerity: ${{ variables.usrVerityTestImageName }}
              tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)

          # Push (regular or container) testimages, confexts, and/or sysexts to
          # ACR
          - template: ../common_tasks/push-to-acr.yml
            parameters:
              tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
              imageName: ${{ variables.testImageName }}
              config: ${{ variables.tridentConfigurationName }}
              deploymentEnvironment: "virtualMachine"
              runtimeEnvironment: ${{ parameters.runtimeEnv }}
              acrServiceConnectionName: ${{ parameters.acrServiceConnectionName }}

          - template: netlaunch-prep.yml

          - template: ../testing_common/trident-prep.yml
            parameters:
              tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
              tridentConfigPath: $(TRIDENT_SOURCE_DIR)/$(tridentConfigPath)
              runtimeEnv: ${{ parameters.runtimeEnv }}
              config: ${{ variables.tridentConfigurationName }}
              imageName: ${{ variables.testImageName }}

          - bash: |
              set -eux

              # Disable virtlogd rollover by setting max_size to 0
              cat /etc/libvirt/virtlogd.conf
              echo "max_size = 0" | sudo tee -a /etc/libvirt/virtlogd.conf
              cat /etc/libvirt/virtlogd.conf
              sudo systemctl restart virtlogd.socket

              ./tools/virt-deploy create --mem 12 --disks 32,32
            workingDirectory: $(TRIDENT_SOURCE_DIR)
            displayName: "Creating virt-deploy VM"

          - bash: |
              set -euxo pipefail
              MAX_FAILURES_FLAG=""

              # rerun and memory-constraint-combined are expected to fail ONCE.
              # In latter test, first run modifies the service file and exits
              # prematurely, so that the second run has memory constraints
              # applied.
              if [[ "${{ variables['tridentConfigurationName'] }}" == 'rerun' || "${{ variables['tridentConfigurationName'] }}" == 'memory-constraint-combined' ]]; then
                MAX_FAILURES_FLAG="--max-failures 1"
              fi

              # Enable SecureBoot for all E2E tests.
              SECURE_BOOT=""
              if [[ "${{ parameters.testSecureBoot }}" == 'True' ]]; then
                SECURE_BOOT="--secure-boot"
              fi

              # If this is a usr-verity UKI image, a signing certificate must
              # be set via --signing-cert; otherwise, set it to an empty
              # string. This can also be used for sysext signing.
              TRIDENT_CONFIG="$(TRIDENT_SOURCE_DIR)/$(tridentConfigPath)/trident-config.yaml"
              IMAGE_URL=$(sudo yq '.image.url' "$TRIDENT_CONFIG")
              CERT_SEARCH_PATH="$(System.ArtifactsDirectory)/usrverity-testimage"
              CA_CERT_PATH="$CERT_SEARCH_PATH/ca_cert.pem"
              if [[ "$IMAGE_URL" == *usrverity.cosi ]] && [ -f "$CA_CERT_PATH" ]; then
                SIGNING_CERT="--signing-cert $CA_CERT_PATH"
              else
                SIGNING_CERT=""
              fi

              # If this is a usr-verity UKI image and the test will run in a
              # container, then overwrite the PCRs to exclude PCR 7.
              ENCRYPTION_VALUE=$(sudo yq '.storage.encryption' "$TRIDENT_CONFIG")
              if [[ "$IMAGE_URL" == *usrverity.cosi && \
                    "${{ parameters.runtimeEnv }}" == 'container' && \
                    "$ENCRYPTION_VALUE" != "null" ]]; then
                sudo yq -i '
                  .storage.encryption.pcrs = ["boot-loader-code", "kernel-boot"]
                ' "$TRIDENT_CONFIG"

                echo "Updated Trident config:"
                sudo yq '.' "$TRIDENT_CONFIG"
              fi

              HANDLE_PROVISIONED_STATE_ARG="--wait-for-provisioned-state"
              if [ "${{ variables['tridentConfigurationName'] }}" == "health-checks-install" ]; then
                # In health-checks-install, the Host Status will never reach
                # 'provisioned' state, because the health checks are designed to
                # fail.
                # netlaunch typically returns the exit code reflecting the call
                # to 'trident commit' on the target OS. For this test, we do not
                # want this non-zero exit code to cause netlaunch to return failure,
                # so we set this flag to only print the exit code instead.
                HANDLE_PROVISIONED_STATE_ARG="--only-print-exit-code"
              fi

              ./bin/netlaunch \
                  --iso ./artifacts/iso/$(installerISOName).iso \
                  --config $(TRIDENT_SOURCE_DIR)/tools/vm-netlaunch.yaml \
                  --trident "$TRIDENT_CONFIG" \
                  --servefolder ./artifacts/test-image \
                  --logstream \
                  $MAX_FAILURES_FLAG \
                  --trace-file $(TRIDENT_SOURCE_DIR)/trident-clean-install-metrics.jsonl \
                  --force-color \
                  --full-logstream logstream-full.log \
                  $HANDLE_PROVISIONED_STATE_ARG \
                  $SECURE_BOOT \
                  $SIGNING_CERT \
                  --port ${{variables.netlaunchPort}} 2>&1 | tee ./clean-install-deployment.log
            workingDirectory: $(TRIDENT_SOURCE_DIR)
            displayName: "🚀 Run netlaunch for testing"
            timeoutInMinutes: 20

          - bash: |
              set -eux

              sudo ./bin/storm-trident helper wait-for-login -a \
                  --vm-name "$(jq -r '.virtualmachines[0].name' $(TRIDENT_SOURCE_DIR)/tools/virt-deploy-metadata.json)" \
                  --artifacts-folder "$(ob_outputDirectory)"

            timeoutInMinutes: 5
            condition: succeededOrFailed()
            workingDirectory: $(TRIDENT_SOURCE_DIR)
            displayName: "📄 Check target OS deployment"

          - bash: |
              set -eux

              HOST_IP=$(jq -r '.virtualmachines[0].ip' $(TRIDENT_SOURCE_DIR)/tools/virt-deploy-metadata.json)
              ./bin/storm-trident helper check-tracing \
                  "$(TRIDENT_SOURCE_DIR)/tests/e2e_tests/helpers/key" \
                  "$HOST_IP" \
                  "testing-user" \
                  "${{ parameters.runtimeEnv }}" \
                  --metric-file $(TRIDENT_SOURCE_DIR)/trident-clean-install-metrics.jsonl
            timeoutInMinutes: 5
            displayName: "Check for trace file and journald logs for expected trace entry"
            workingDirectory: $(TRIDENT_SOURCE_DIR)

          - bash: |
              set -eux
              ./bin/storm-trident script capture-screenshot \
                  --screenshot-filename "install.png" \
                  --artifacts-folder "$(ob_outputDirectory)"
            displayName: "📷 Capture screenshot: clean install"
            workingDirectory: $(TRIDENT_SOURCE_DIR)
            condition: succeededOrFailed()

          - bash: |
              set -eux
              sudo ./bin/storm-trident helper display-logs -a \
                  --serial-log-artifact-file-name "clean-install-target-os-A-serial.log" \
                  --trident-trace-log-file "$(TRIDENT_SOURCE_DIR)/logstream-full.log" \
                  --artifacts-folder "$(ob_outputDirectory)"
            displayName: "📄 Display clean install logs"
            workingDirectory: $(TRIDENT_SOURCE_DIR)
            condition: succeededOrFailed()

          - bash: |
              set -eux

              HOST_IP=$(jq -r '.virtualmachines[0].ip' $(TRIDENT_SOURCE_DIR)/tools/virt-deploy-metadata.json)
              ./bin/storm-trident helper check-selinux \
                  "$(TRIDENT_SOURCE_DIR)/tests/e2e_tests/helpers/key" \
                  "$HOST_IP" \
                  "testing-user" \
                  "${{ parameters.runtimeEnv }}" \
                  --audit-file $(ob_outputDirectory)/audit.log \
            timeoutInMinutes: 5
            condition: and(succeeded(), eq('${{ parameters.runtimeEnv }}', 'host'))
            displayName: "📄 Check for SELinux failures"
            workingDirectory: $(TRIDENT_SOURCE_DIR)

          - bash: |
              set -eux
              HOST_IP=$(jq -r '.virtualmachines[0].ip' $(TRIDENT_SOURCE_DIR)/tools/virt-deploy-metadata.json)
              ssh -o StrictHostKeyChecking=no -i $(TRIDENT_SOURCE_DIR)/tests/e2e_tests/helpers/key testing-user@$HOST_IP \
                'sudo journalctl -u docker.service'
              ssh -o StrictHostKeyChecking=no -i $(TRIDENT_SOURCE_DIR)/tests/e2e_tests/helpers/key testing-user@$HOST_IP \
                'sudo journalctl -u trident-container.service'
            condition: and(succeeded(), eq('${{ parameters.runtimeEnv }}', 'container'))
            displayName: "📄 Display Container logs"
            workingDirectory: $(TRIDENT_SOURCE_DIR)
          - bash: |
              set -eux
              HOST_IP=$(jq -r '.virtualmachines[0].ip' $(TRIDENT_SOURCE_DIR)/tools/virt-deploy-metadata.json)
              ./bin/storm-trident helper boot-metrics \
                  "$(TRIDENT_SOURCE_DIR)/tests/e2e_tests/helpers/key" \
                  "$HOST_IP" \
                  "testing-user" \
                  "${{ parameters.runtimeEnv }}" \
                  --metrics-file $(TRIDENT_SOURCE_DIR)/trident-clean-install-metrics.jsonl \
                  --metrics-operation install
            displayName: "Create boot metrics for booting into target OS"
            workingDirectory: $(TRIDENT_SOURCE_DIR)

          - template: ../testing_common/trident-metrics.yml
            parameters:
              tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
              tridentConfigPath: $(TRIDENT_SOURCE_DIR)/$(tridentConfigPath)
              deploymentEnvironment: virtualMachine
              runtimeEnvironment: ${{ parameters.runtimeEnv }}
              tridentConfigurationName: $(tridentConfigurationName)
              metricsFile: $(TRIDENT_SOURCE_DIR)/trident-clean-install-metrics.jsonl
              ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
                kustoTableName: main
              ${{ if ne(variables['Build.SourceBranchName'], 'main') }}:
                kustoTableName: dev

          - template: ../testing_common/e2e-test-run.yml
            parameters:
              tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
              buildPurpose: ${{ parameters.buildPurpose }}
              deploymentEnvironment: virtualMachine
              tridentConfigurationName: $(tridentConfigurationName)
              hostIp: $(jq -r '.virtualmachines[0].ip' $(TRIDENT_SOURCE_DIR)/tools/virt-deploy-metadata.json)
              runtimeEnv: ${{ parameters.runtimeEnv }}
              tridentConfigPath: $(TRIDENT_SOURCE_DIR)/$(tridentConfigPath)
              sshKeyPath: $(TRIDENT_SOURCE_DIR)/tests/e2e_tests/helpers/key
              userName: testing-user
              artifactsDirectory: artifacts/test-image
              netlistenPort: ${{variables.netlaunchPort}}

          - template: ../common_tasks/remove-from-acr.yml
            parameters:
              tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
              repository: ${{ variables.testImageName }}
              config: ${{ variables.tridentConfigurationName }}
              deploymentEnvironment: "virtualMachine"
              acrServiceConnectionName: ${{ parameters.acrServiceConnectionName }}

          - bash: |
              set -eux
              sudo virsh shutdown virtdeploy-vm-0
              mkdir -p $(ob_outputDirectory)
              sudo cp /var/lib/libvirt/images/virtdeploy-pool/virtdeploy-vm-0-0-volume.qcow2 $(ob_outputDirectory)/
              sudo zstd -T0 $(ob_outputDirectory)/virtdeploy-vm-0-0-volume.qcow2
              sudo cp $(TRIDENT_SOURCE_DIR)/tests/e2e_tests/helpers/key $(ob_outputDirectory)
              sudo chmod 777 $(ob_outputDirectory)/key
            workingDirectory: $(TRIDENT_SOURCE_DIR)
            condition: failed()
            displayName: "Publish OS disk"

          - template: ../testing_common/fix-output-directory-for-one-branch-step.yml
            parameters:
              outputDir: $(ob_outputDirectory)
              condition: always()

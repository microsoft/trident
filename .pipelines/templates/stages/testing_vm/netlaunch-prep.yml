steps:
  - bash: |
      set -eux

      # Print OS version:
      cat /etc/os-release

      echo "Context:"
      pwd
      ls -la
    displayName: "Print pipeline context"

  # Connect Pip to internal feed rather than PyPI
  - template: ../common_tasks/avoid-pypi-usage.yml
  - bash: |
      set -eux

      sudo NEEDRESTART_MODE=a apt-get install -y \
          bridge-utils \
          virt-manager \
          qemu-efi \
          qemu-kvm \
          libvirt-daemon-system \
          libvirt-clients \
          python3-libvirt \
          ovmf \
          openssl \
          python3-netifaces \
          python3-docker \
          python3-bcrypt \
          python3-jinja2 \
          zstd \
          imagemagick

      # Use `-E` to preserve PipAuthenticate connection to
      # internal feed replacing PyPI.
      # Pin to a working version to avoid breaking change
      # introduced in 26.4.
      sudo -E pip3 install virt-firmware==26.2 -vvv
    displayName: Install virt-deploy dependencies
    retryCountOnTaskFailure: 3

  - bash: |
      set -eux

      sudo usermod -a -G libvirt $USER

      mkdir -p ~/.config/libvirt
      cat << EOF > ~/.config/libvirt/libvirt.conf
      uri_default = "qemu:///system"
      EOF

      sudo mkdir -p /etc/systemd/system/libvirtd.socket.d
      echo "[Socket]
      SocketMode=0666" | sudo tee /etc/systemd/system/libvirtd.socket.d/mode.conf > /dev/null

      sudo systemctl daemon-reload

      sudo systemctl stop libvirtd.service
      sudo systemctl restart libvirtd.socket
      sudo systemctl start libvirtd.service

    displayName: "Configure libvirt access"

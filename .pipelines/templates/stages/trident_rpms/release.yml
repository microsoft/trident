parameters:
  - name: targetArchitecture
    type: string
    default: "amd64"
    values:
      - arm64
      - amd64

  - name: distro
    type: string
    default: "azl3"
    values:
      - azl3
      - azl4

  - name: tridentRepoDirectory
    type: string

  - name: artifactDirectory
    type: string

steps:
  - script: |
      set -eux
      TRIDENT_VERSION=$(python3 ./scripts/get-version.py "$(Build.BuildNumber)" --commit)
      echo "##vso[task.setvariable variable=trident_version]$TRIDENT_VERSION"
    displayName: "Setting Trident version"
    workingDirectory: ${{ parameters.tridentRepoDirectory }}

  - task: onebranch.pipeline.version@1
    displayName: "Set build number"
    inputs:
      system: "Custom"
      customVersion: $(trident_version)

  - script: sudo tdnf install -y moby-buildx p7zip p7zip-plugins zstd
    displayName: Install native dependencies
    retryCountOnTaskFailure: 3

  - script: |
      set -eux
      sudo systemctl start docker
    workingDirectory: ${{ parameters.tridentRepoDirectory }}
    displayName: Start Docker

  - template: ../common_tasks/preview-container.yml
    parameters:
      dockerfilePath: ${{ parameters.tridentRepoDirectory }}/packaging/docker/Dockerfile.full
      tridentSourceDirectory: ${{ parameters.tridentRepoDirectory }}
      targetArchitecture: ${{ parameters.targetArchitecture }}

  - script: |
      set -eux
      full_version=$(trident_version)

      # Separate into version and prerelease identifier
      # for the RPM build.
      version=$(echo $full_version | cut -d'-' -f1)
      prerelease=$(echo $full_version | cut -d'-' -f2-)

      # Build RPMs and export only the artifact tarball (no image load/unpack).
      # CARGO_REGISTRIES_BMP_PUBLICPACKAGES_TOKEN is populated by the CargoAuthenticate task.
      outdir="/tmp/_rpm_artifacts"
      rm -rf "$outdir"
      mkdir -p "$outdir"

      AZL_IMAGE="$(DISTRO=${{ parameters.distro }} make azl-version-vars | grep AZL_IMAGE | cut -d '=' -f2)"
      DISTRO_PACKAGES="$(DISTRO=${{ parameters.distro }} make azl-version-vars | grep DISTRO_PACKAGES | cut -d '=' -f2)"
      RPM_PACKAGES="$(DISTRO=${{ parameters.distro }} make azl-version-vars | grep RPM_PACKAGES | cut -d '=' -f2)"
      RPM_DEST="$(DISTRO=${{ parameters.distro }} make azl-version-vars | grep RPM_DEST | cut -d '=' -f2)"

      docker build -f ${{ parameters.tridentRepoDirectory }}/packaging/docker/Dockerfile.full -t trident/trident-build:latest \
        --secret id=registry_token,env=CARGO_REGISTRIES_BMP_PUBLICPACKAGES_TOKEN \
        --build-arg TRIDENT_VERSION="$full_version" \
        --build-arg RPM_VER="$version"\
        --build-arg RPM_REL="$prerelease.${{ parameters.distro }}"\
        --build-arg AZL_IMAGE="$AZL_IMAGE"\
        --build-arg DISTRO_PACKAGES="$DISTRO_PACKAGES" \
        --build-arg RPM_PACKAGES="$RPM_PACKAGES" \
        --build-arg RPM_DEST="$RPM_DEST" \
        --target artifact \
        --output type=local,dest="$outdir" \
        .

      cp -f "$outdir/trident-rpms.tar.gz" ./trident-rpms.tar.gz

      mkdir -p ${{ parameters.artifactDirectory }}
      tar -xzf trident-rpms.tar.gz -C ${{ parameters.artifactDirectory }} --strip-components=3
    workingDirectory: ${{ parameters.tridentRepoDirectory }}
    displayName: Build RPMs

  - script: ./scripts/extract-binary.sh ${{ parameters.artifactDirectory }} ${{ parameters.artifactDirectory }} ${{ parameters.targetArchitecture }} ${{ parameters.distro }}
    workingDirectory: ${{ parameters.tridentRepoDirectory }}
    displayName: Extract Trident binary

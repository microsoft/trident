parameters:
  - name: installerISO
    displayName: "Image used for the installer, source of Trident (container vs host)"
    type: string
    default: trident-installer
    # Test selection is at runtime, and template parameters cannot be validated against runtime variables.
    # So, do validation in task below rather than specifying this here:
    # values:
    #   - trident-installer
    #   - trident-split-installer
    #   - trident-container-installer
    #   - trident-direct-streaming-installer-amd64
    #   - trident-direct-streaming-installer-arm64

  - name: tridentTestImage
    displayName: "Image used in the target OS, source of Trident (container vs host)"
    type: string
    default: trident-testimage
    values:
      - trident-container-testimage
      - trident-testimage
      - azurelinux-direct-streaming-testimage-amd64
      - azurelinux-direct-streaming-testimage-arm64
      - ubuntu-direct-streaming-testimage-2204-amd64
      - ubuntu-direct-streaming-testimage-2204-arm64
      - ubuntu-direct-streaming-testimage-2404-amd64
      - ubuntu-direct-streaming-testimage-2404-arm64
      - gb200-direct-streaming-testimage-2404-arm64

  - name: tridentTestImageVerity
    displayName: "Image used in the root-verity target OS, source of Trident (container vs host)"
    type: string
    default: trident-verity-testimage
    values:
      - trident-verity-testimage
      - trident-container-verity-testimage
      - skip

  - name: tridentTestImageUsrVerity
    displayName: "Image used in the usr-verity target OS, source of Trident (container vs host)"
    type: string
    default: trident-usrverity-testimage
    values:
      - trident-usrverity-testimage
      - trident-container-usrverity-testimage
      - skip

  - name: downloadTridentContainer
    displayName: "Download Trident container"
    type: boolean
    default: false

  - name: tridentSourceDirectory
    type: string

  - name: tridentTargetDirectory
    type: string
    default: "artifacts/test-image"

  - name: tridentIsoDirectory
    type: string
    default: "artifacts/iso"

  - name: tridentToolsDirectory
    type: string
    default: "bin"

  - name: testImageDir
    type: string
    default: "$(System.ArtifactsDirectory)/testimage"

  - name: testImageDirVerity
    type: string
    default: "$(System.ArtifactsDirectory)/verity-testimage"

  - name: testImageDirUsrVerity
    type: string
    default: "$(System.ArtifactsDirectory)/usrverity-testimage"

  - name: goToolsArtifactName
    type: string
    default: go-tools
    values:
      - go-tools
      - go-tools-arm64

steps:
  - bash: |
      set -eux
      #
      # Test selection is at runtime, and template parameters cannot be validated against runtime variables.
      # So, do validation here.
      #
      case "${{ parameters.installerISO }}" in
          trident-installer|trident-split-installer|trident-container-installer|trident-direct-streaming-installer-amd64|trident-direct-streaming-installer-arm64)
              # Valid image_type, do nothing
              ;;
          *)
              echo "installerISO should be either 'trident-installer', 'trident-split-installer', 'trident-container-installer', 'trident-direct-streaming-installer-amd64', or 'trident-direct-streaming-installer-arm64'."
              exit 1
              ;;
      esac

    displayName: Validate installer ISO name

  - ${{ if parameters.downloadTridentContainer }}:
      - task: DownloadPipelineArtifact@2
        displayName: "Download Trident container"
        inputs:
          buildType: current
          artifactName: "trident-docker-image"
          patterns: "**/trident-container.tar.gz"
          targetPath: "${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentTargetDirectory }}"

  - task: DownloadPipelineArtifact@2
    displayName: "Download ${{ parameters.installerISO }}"
    inputs:
      buildType: current
      artifactName: "${{ parameters.installerISO }}"
      targetPath: "${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentIsoDirectory }}"

  - task: DownloadPipelineArtifact@2
    displayName: "Download ${{ parameters.tridentTestImage }}"
    inputs:
      buildType: current
      artifactName: "${{ parameters.tridentTestImage }}"
      targetPath: "${{ parameters.testImageDir }}"

  - ${{ if ne(parameters.tridentTestImageVerity, 'skip') }}:
    - task: DownloadPipelineArtifact@2
      displayName: "Download ${{ parameters.tridentTestImageVerity }}"
      inputs:
        buildType: current
        artifactName: "${{ parameters.tridentTestImageVerity }}"
        targetPath: "${{ parameters.testImageDirVerity }}"

  - ${{ if ne(parameters.tridentTestImageUsrVerity, 'skip') }}:
    - task: DownloadPipelineArtifact@2
      displayName: "Download ${{ parameters.tridentTestImageUsrVerity }}"
      inputs:
        buildType: current
        artifactName: "${{ parameters.tridentTestImageUsrVerity }}"
        targetPath: "${{ parameters.testImageDirUsrVerity }}"

  - task: DownloadPipelineArtifact@2
    displayName: "Download ${{ parameters.goToolsArtifactName }}"
    inputs:
      buildType: current
      artifactName: ${{ parameters.goToolsArtifactName }}
      patterns: |
        netlaunch
        netlisten
        mkcosi
        storm-trident
        virtdeploy
      targetPath: "${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentToolsDirectory }}"

  - bash: |
      # Debug log
      echo "REGULAR IMAGES:"
      ls -alh "${{ parameters.testImageDir }}"

      if [ "${{ parameters.tridentTestImageVerity }}" != "skip" ]; then
        echo ""
        echo "VERITY IMAGES:"
        ls -alh "${{ parameters.testImageDirVerity }}"
      fi

      set -eux

      # Set tools to be executable
      chmod +x ${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentToolsDirectory }}/net*
      chmod +x ${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentToolsDirectory }}/mkcosi
      chmod +x ${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentToolsDirectory }}/storm-trident
      chmod +x ${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentToolsDirectory }}/virtdeploy

      # Call helper to copy and rename images!
      ${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentToolsDirectory }}/storm-trident \
          helper prepare-images -a -- \
          "${{ parameters.testImageDir }}" \
          "${{ parameters.testImageDirVerity }}" \
          "${{ parameters.testImageDirUsrVerity }}" \
          "${{ parameters.tridentTestImage }}" \
          "${{ parameters.tridentTestImageVerity }}" \
          "${{ parameters.tridentTestImageUsrVerity }}" \
          "${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentTargetDirectory }}" \
          -v 4

      # List tools in the target directory
      ls -lh "${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentToolsDirectory }}"

      # List ISOs in the target directory
      ls -lh "${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentIsoDirectory }}"

      # List images in the target directory
      ls -lh "${{ parameters.tridentSourceDirectory }}/${{ parameters.tridentTargetDirectory }}"
    displayName: "Move and Rename Trident Test Images"

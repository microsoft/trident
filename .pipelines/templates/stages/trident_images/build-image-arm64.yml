parameters:
  # Define checkout name for the Trident repo. If this is
  # loaded from a pipeline hosted in the Trident repo, use
  # `self`. If this is loaded from a pipeline hosted in a
  # different repo, use the repository name defined in the
  # pipeline resources.
  - name: tridentRepoName
    type: string
    default: self

  - name: label
    type: string
    displayName: "Label for the image"
    default: ""

  - name: makeTarget
    type: string
    displayName: "Make target for the image"
    default: ""

  - name: baseimgType
    type: string
    displayName: "Base image type"

  - name: baseimgAzlVersion
    displayName: Base Image AZL version
    type: string
    default: "3.0"

  - name: micBuildType
    displayName: MIC Build Type
    type: string
    values:
      - dev
      - preview
      - release
    default: release

  - name: micVersion
    displayName: MIC Version
    type: string
    default: "*.*.*"

  - name: useStagedSshKeys
    displayName: "Use staged SSH keys"
    type: boolean
    default: false

jobs:
  - job: PrepareImage_${{ replace(parameters.label, '-', '_') }}
    displayName: Prepare Image ${{ parameters.label }}
    timeoutInMinutes: 20
    pool:
      type: linux

    variables:
      ob_outputDirectory: $(Pipeline.Workspace)/s/trident/out
      ob_artifactBaseName: "image-${{ parameters.label }}"

    steps:
      - template: ../common_tasks/checkout_trident.yml
        parameters:
          tridentRepoName: ${{ parameters.tridentRepoName }}
      - template: ../common_tasks/avoid-pypi-usage.yml

      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: current
          artifactName: trident-binaries
          targetPath: "$(Build.ArtifactStagingDirectory)/trident"
        displayName: Download Trident RPMs

      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: current
          artifactName: ssh-keys
          targetPath: "$(Build.ArtifactStagingDirectory)/ssh"
        displayName: Download SSH Keys

      - template: ../common_tasks/find-base-image-version.yml
        parameters:
          tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
          architecture: "arm64"

      - template: ./trident-testimg-template.yml
        parameters:
          tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
          target: ${{ parameters.makeTarget }}
          outputDirectory: "$(ob_outputDirectory)"
          micBuildType: ${{ parameters.micBuildType }}
          micVersion: ${{ parameters.micVersion }}
          baseimgBuildType: $(BASEIMG_BUILD_TYPE)
          baseimgVersion: $(BASEIMG_VERSION)
          rpmsVersion: $(RPMS_VERSION)
          baseimgAzureLinuxVersion: ${{ parameters.baseimgAzlVersion }}
          baseimgTypes:
            - ${{ parameters.baseimgType }}
          useStagedSshKeys: ${{ parameters.useStagedSshKeys }}
          micArchitecture: arm64

parameters:
  # Define checkout name for the Trident repo. If this is
  # loaded from a pipeline hosted in the Trident repo, use
  # `self`. If this is loaded from a pipeline hosted in a
  # different repo, use the repository name defined in the
  # pipeline resources.
  - name: tridentRepoName
    type: string
    default: self

  - name: label
    type: string
    displayName: "Label for the image"
    default: ""

  - name: labelPrefix
    type: string
    displayName: "Prefix for the image label"
    default: "image-"

  - name: makeTarget
    type: string
    displayName: "Make target for the image"
    default: ""

  - name: baseimgType
    type: string
    displayName: "Base image type"

  - name: baseimgAzlVersion
    displayName: Base Image AZL version
    type: string
    default: "3.0"

  - name: micBuildType
    displayName: MIC Build Type
    type: string
    values:
      - dev
      - preview
      - release
    default: release

  - name: micVersion
    displayName: MIC Version
    type: string
    default: "*.*.*"

  - name: useStagedSshKeys
    displayName: "Use staged SSH keys"
    type: boolean
    default: false

  - name: pipelineArchitecture
    displayName: Architecture for pipeline
    type: string
    values:
      - arm64
      - amd64
    default: "amd64"

  - name: targetArchitecture
    displayName: Architecture for target images
    type: string
    values:
      - arm64
      - amd64
    default: "amd64"

  - name: downloadGoTools
    displayName: "Download Go Tools"
    type: boolean
    default: false

  - name: downloadTrident
    displayName: "Download Trident RPMs"
    type: boolean
    default: true

  - name: timeoutInMinutes
    displayName: "Timeout for the job in minutes"
    type: number
    default: 20

jobs:
  - job: PrepareImage_${{ replace(parameters.label, '-', '_') }}
    displayName: Prepare Image ${{ parameters.label }}
    timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
    pool:
      ${{ if eq(parameters.pipelineArchitecture, 'arm64') }}:
        type: linux
        name: azl3-hci-ARM64-1es-pool-westcentralus
        hostArchitecture: arm64
      ${{ if eq(parameters.pipelineArchitecture, 'amd64') }}:
        type: linux

    variables:
      ob_outputDirectory: $(Build.SourcesDirectory)/out
      ob_artifactBaseName: "${{ parameters.labelPrefix }}${{ parameters.label }}"
      ${{ if eq(parameters.targetArchitecture, 'amd64') }}:
        tridentArtifactName: trident-binaries
      ${{ if eq(parameters.targetArchitecture, 'arm64') }}:
        tridentArtifactName: trident-binaries-arm64
      ${{ if eq(parameters.pipelineArchitecture, 'amd64') }}:
        goToolsArtifactName: go-tools
      ${{ if eq(parameters.pipelineArchitecture, 'arm64') }}:
        goToolsArtifactName: go-tools-arm64

    steps:
      - template: ../common_tasks/checkout_trident.yml
        parameters:
          tridentRepoName: ${{ parameters.tridentRepoName }}
          tridentSourceDirectoryVariableName: TRIDENT_SOURCE_DIR
      - template: ../common_tasks/avoid-pypi-usage.yml

      - ${{ if parameters.downloadGoTools }}:
        - task: DownloadPipelineArtifact@2
          displayName: "Download $(goToolsArtifactName)"
          inputs:
            buildType: current
            artifactName: $(goToolsArtifactName)
            targetPath: "$(TRIDENT_SOURCE_DIR)/bin"
        - bash: |
            set -eux
            chmod +x $(TRIDENT_SOURCE_DIR)/bin/*
          displayName: "Make go tools executable"

      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: current
          artifactName: ssh-keys
          targetPath: "$(Build.ArtifactStagingDirectory)/ssh"
        displayName: Download SSH Keys

      - template: ../common_tasks/find-base-image-version.yml
        parameters:
          architecture: ${{ parameters.targetArchitecture }}
          tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
      - template: ./trident-testimg-template.yml
        parameters:
          tridentSourceDirectory: $(TRIDENT_SOURCE_DIR)
          target: ${{ parameters.makeTarget }}
          outputDirectory: "$(ob_outputDirectory)"
          micBuildType: ${{ parameters.micBuildType }}
          micVersion: ${{ parameters.micVersion }}
          micArchitecture: ${{ parameters.targetArchitecture }}
          pipelineArchitecture: ${{ parameters.pipelineArchitecture }}
          tridentArtifactName: $(tridentArtifactName)
          baseimgBuildType: $(BASEIMG_BUILD_TYPE)
          baseimgVersion: $(BASEIMG_VERSION)
          rpmsVersion: $(RPMS_VERSION)
          baseimgAzureLinuxVersion: ${{ parameters.baseimgAzlVersion }}
          baseimgTypes:
            - ${{ parameters.baseimgType }}
          useStagedSshKeys: ${{ parameters.useStagedSshKeys }}
          downloadTrident: ${{ parameters.downloadTrident }}

parameters:
  - name: tridentSourceDirectory
    type: string

  - name: outputDirectory
    type: string

  - name: target
    type: string

  - name: pipelineArchitecture
    displayName: Architecture for pipeline
    type: string
    values:
      - arm64
      - amd64
    default: "amd64"

  - name: micBuildType
    displayName: MIC Build Type
    type: string
    values:
      - dev
      - preview
      - release
    default: release

  - name: micArchitecture
    displayName: Architecture for MIC
    type: string
    values:
      - arm64
      - amd64
    default: "amd64"

  - name: micVersion
    displayName: MIC Version
    type: string
    default: "*.*.*"

  - name: baseimgBuildType
    displayName: Base Image build type
    type: string
    default: "release"
    # values:
    #   - dev
    #   - preview
    #   - release

  - name: baseimgVersion
    displayName: Base Image Version
    type: string
    default: "*.*.*"

  - name: rpmsVersion
    displayName: RPM Version
    type: string
    default: "*.*.*"

  - name: baseimgAzureLinuxVersion
    displayName: Version of AzureLinux for the Base Image
    type: string
    values:
      - "2.0"
      - "3.0"
    default: "3.0"

  - name: baseimgTypes
    displayName: Base Image Types
    type: object
    values:
      - baremetal
      - core_arm64
      - core_selinux
      - minimal
      - qemu_guest
      - ubuntu_2204_amd64
      - ubuntu_2204_arm64
      - ubuntu_2404_amd64
      - ubuntu_2404_arm64
      - gb200_2404_arm64
    default: 
      - baremetal

  - name: downloadTrident
    type: boolean
    default: true

  - name: tridentPipelineRunId
    type: string
    default: ""

  # Default: trident-ci
  # https://dev.azure.com/mariner-org/ECF/_build?definitionId=3371
  - name: tridentPipelineId
    type: string
    default: 3371

  - name: tridentArtifactName
    type: string
    default: trident-binaries

  - name: generateSshKeys
    type: boolean
    default: false

  - name: useStagedSshKeys
    type: boolean
    default: false

steps:
  - template: ../common_tasks/avoid-pypi-usage.yml

  - ${{ if eq(parameters.downloadTrident, true) }}:
      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: current
          artifactName: ${{ parameters.tridentArtifactName}}
          targetPath: "$(Build.ArtifactStagingDirectory)/trident"
        displayName: Download Trident RPMs

  - ${{ if eq(parameters.generateSshKeys, true) }}:
      - bash: |
          set -eux

          mkdir -p ${{ parameters.tridentSourceDirectory }}/artifacts
          ssh-keygen -t rsa -b 2048 -f ${{ parameters.tridentSourceDirectory }}/artifacts/id_rsa -q -N ""
        displayName: Set up SSH Keys
  - ${{ if eq(parameters.useStagedSshKeys, true) }}:
      - bash: |
          set -eux

          mkdir -p ${{ parameters.tridentSourceDirectory }}/artifacts
          cp $(Build.ArtifactStagingDirectory)/ssh/id_rsa* ${{ parameters.tridentSourceDirectory }}/artifacts/
        displayName: Copy SSH Keys

  - script: |
      echo "##[warning]THE PIPELINE TEMPLATE trident-testimg-template.yaml IS DEPRECATED. PLEASE SWITCH TO USING testimages.py TO BUILD TEST IMAGES."
      cat /etc/os-release
    displayName: "Report Host Info"

  - bash: ${{ parameters.tridentSourceDirectory }}/.pipelines/scripts/install-native-deps.sh
    displayName: "Install native dependencies"
    retryCountOnTaskFailure: 3
    env:
      MIC_ARCHITECTURE: ${{ parameters.micArchitecture }}
      PIPELINE_ARCHITECTURE: ${{ parameters.pipelineArchitecture }}

  - template: common/mic-download-template.yaml@platform-pipelines
    parameters:
      buildType: ${{ parameters.micBuildType }}
      arch: ${{ parameters.micArchitecture }}
      micVersion: ${{ parameters.micVersion }}

  - ${{ each baseimgType in parameters.baseimgTypes }}:
    - ${{ if or(contains(baseimgType, 'gb200'), contains(baseimgType, 'ubuntu')) }}:
      - task: AzureCLI@2
        inputs:
          azureSubscription: azlinuxbmpstaging-storage-account-read
          scriptType: bash
          scriptLocation: scriptPath
          scriptPath: ${{ parameters.tridentSourceDirectory }}/.pipelines/scripts/download-base-image.sh
        retryCountOnTaskFailure: 5
        displayName: "Download Base Image - ${{ baseimgType }}"
        env:
          BASE_IMG_TYPE: ${{ baseimgType }}
          ARTIFACT_STAGING_DIR: $(Build.ArtifactStagingDirectory)

    - ${{ else }}:
      - template: common/base-images-download-template.yaml@platform-pipelines
        parameters:
          buildType: ${{ parameters.baseimgBuildType }}
          baseImageType: ${{ baseimgType }}
          imageVersion: ${{ parameters.baseimgVersion }}
          azureLinuxVersion: ${{ parameters.baseimgAzureLinuxVersion }}

  # For dev builds, the RPMs are not necessarily published, so download them here. The
  # parameter is set based on a runtime variable, so we cannot use ${{ if }}, so the
  # template is always run and contains logic to skip if not needed.
  - template: common/rpms-download-template.yaml@platform-pipelines
    parameters:
      rpmsVersion: ${{ parameters.rpmsVersion }}
      azureLinuxVersion: ${{ parameters.baseimgAzureLinuxVersion }}
      runtimeBuildType: ${{ parameters.baseimgBuildType }}

  - bash: ${{ parameters.tridentSourceDirectory }}/.pipelines/scripts/prepare-image-requirements.sh
    workingDirectory: ${{ parameters.tridentSourceDirectory }}
    displayName: "Prepare and move requirements"
    env:
      TRIDENT_SOURCE_DIR: ${{ parameters.tridentSourceDirectory }}
      ARTIFACT_STAGING_DIR: $(Build.ArtifactStagingDirectory)

  - bash: ${{ parameters.tridentSourceDirectory }}/.pipelines/scripts/build-test-image.sh
    workingDirectory: ${{ parameters.tridentSourceDirectory }}
    displayName: "Build Test Image"
    env:
      MIC_BUILD_TYPE: ${{ parameters.micBuildType }}
      MIC_ARCHITECTURE: ${{ parameters.micArchitecture }}
      PIPELINE_ARCHITECTURE: ${{ parameters.pipelineArchitecture }}
      MAKE_TARGET: ${{ parameters.target }}

  - bash: ${{ parameters.tridentSourceDirectory }}/.pipelines/scripts/copy-image-artifacts.sh
    workingDirectory: ${{ parameters.tridentSourceDirectory }}
    displayName: "Copy artifacts to output directory"
    env:
      OUTPUT_DIR: ${{ parameters.outputDirectory }}
      MAKE_TARGET: ${{ parameters.target }}

# TRIDENT PLATFORM CICD TEMPLATE
# This template is used by the platform-cicd-preview pipeline to
# build and test trident deployment scenarios for a specified AZL
# preview build.

parameters:
  - name: baremetalTestsEnabled
    type: boolean
    default: false

  - name: baseImageArtifactStage
    type: string

  - name: targetArchitecture
    type: string
    values:
      - amd64
      - arm64

  # We have three options for how to handle the Trident binaries artifact in this pipeline:
  # 1) default: use the default behavior for this pipeline
  # 2) forceBuild: force this pipeline to build the Trident binaries artifact
  # 3) prebuilt: the Trident binaries artifact already exists
  - name: tridentBuildOptions
    displayName: "Trident Build Options"
    type: string
    default: default
    values:
      - default
      - forceBuild
      - prebuilt

  # Define whether to run tests using SecureBoot or not. This impacts both
  # which tests run (many encryption-related tests only run with SecureBoot enabled) and
  # how the test machines are configured.
  - name: testSecureBoot
    displayName: "Test Secure Boot"
    type: boolean
    default: true

  - name: micVersion
    displayName: MIC Version
    type: string
    default: "*.*.*"

  # Define which service connection to use for accessing ACR.
  #   `maritimus-dev-acr-write-umi` is the service connection for the Polar SC
  #   `trident-dev-acr-write-umi-ECF` is the service connection for the ECF SC
  - name: acrServiceConnectionName
    type: string
    default: trident-dev-acr-write-umi-ECF
    values:
      - maritimus-dev-acr-write-umi
      - trident-dev-acr-write-umi-ECF

stages:
  - ${{ if eq( parameters.targetArchitecture, 'amd64') }}:
    - template: e2e-template.yml
      parameters:
        stageType: azl-validation
        baremetalTestsEnabled: ${{ parameters.baremetalTestsEnabled }}
        baseImageArtifactStage: ${{ parameters.baseImageArtifactStage }}
        tridentBuildOptions: ${{ parameters.tridentBuildOptions }}
        testSecureBoot: ${{ parameters.testSecureBoot }}
        micBuildType: dev
        micVersion: ${{ parameters.micVersion }}
        acrServiceConnectionName: ${{ parameters.acrServiceConnectionName }}

  - ${{ if eq( parameters.targetArchitecture, 'arm64') }}:
    - stage: PrepareSSHKeys
      displayName: Prepare SSH Keys
      jobs:
        - template: stages/testing_servicing/generate-ssh-keys.yml

    - template: e2e-arm64-template.yml
      parameters:
        stageType: azl-validation
        tridentBuildOptions: ${{ parameters.tridentBuildOptions }}
        baseImageArtifactStage: ${{ parameters.baseImageArtifactStage }}

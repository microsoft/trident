# Azure Linux 4.0 base VHDX config used by the trident test images.
#
# The AZL4 trident-vm-grub-testimage-azl4 testimages.py entry consumes
# `artifacts/azl4_qemu_guest.vhdx`, but ADO does not yet publish a
# prebuilt AZL4 VHDX. Build one locally with Image Customizer:
#
#   sudo imagecustomizer create \
#     --config-file tests/images/azl4-qemu-guest.yaml \
#     --rpm-source tests/images/azl4-alpha2.repo \
#     --tools-file <path-to-azl4-tools.tar.gz> \
#     --build-dir /tmp/azl4-base-build \
#     --output-image-file artifacts/azl4_qemu_guest.vhdx \
#     --output-image-format vhdx \
#     --distro azurelinux --distro-version 4.0
#
# The package set here is the union of what AZL4 needs to boot in a QEMU
# guest plus what the customize step will then layer on. Keep this in sync
# with the `os.packages.install` list in
# tests/images/trident-vm-testimage/base/updateimg-grub-azl4.yaml so the
# customize layer doesn't have to fight to add basic OS bits.
previewFeatures:
- create

storage:
  bootType: efi
  disks:
    - maxSize: 5G
      partitionTableType: gpt
      partitions:
        - id: esp
          size: 64M
          type: esp
        - id: root
          size: grow
  filesystems:
    - deviceId: esp
      type: fat32
      mountPoint:
        path: /boot/efi
        options: umask=0077
    - deviceId: root
      type: ext4
      mountPoint: /

os:
  hostname: azl4-base
  bootloader:
    resetType: hard-reset
  kernelCommandLine:
    extraCommandLine:
      - console=tty0
      - console=ttyS0
      - net.ifnames=0
  packages:
    install:
      - azurelinux-release
      - azurelinux-repos
      - bash
      - ca-certificates
      - coreutils
      - curl
      - dnf5
      - dracut
      - dracut-network
      - e2fsprogs
      - efibootmgr
      - filesystem
      - grub2-efi-x64
      - grub2-efi-x64-modules
      - grub2-tools
      - grub2-tools-efi
      - iproute
      - iptables-nft
      - jq
      - kernel
      - lsof
      - openssh-server
      - rpm
      - shadow-utils
      - shim
      - sudo
      - systemd
      - systemd-networkd
      - systemd-resolved
      - systemd-udev
      - util-linux
      - vim
      - which
      - zlib

# SELinux validation base image.
# Based on test-images platform-integration-images/trident-verity-testimage/usr/host.yaml
# with SELinux ENFORCING and only the public trident-selinux policy
# (no trident-test-selinux). Validates that the production SELinux policy
# is sufficient for the systemd-activated update path.
storage:
  disks:
    - partitionTableType: gpt
      maxSize: 5G
      partitions:
        - id: esp
          type: esp
          size: 500M
          label: esp

        - id: boot
          size: 150M

        - id: root
          size: 2G

        - id: usr-data
          label: usr
          size: 1G

        - id: usr-hash
          label: usr-hash
          size: 128M

  bootType: efi

  verity:
    - id: usr
      name: usr
      dataDeviceId: usr-data
      hashDeviceId: usr-hash
      dataDeviceMountIdType: uuid
      hashDeviceMountIdType: uuid

  filesystems:
    - deviceId: esp
      type: fat32
      mountPoint:
        path: /boot/efi
        options: umask=0077

    - deviceId: boot
      type: ext4
      mountPoint:
        path: /boot

    - deviceId: root
      type: ext4
      mountPoint:
        path: /

    - deviceId: usr
      type: ext4
      mountPoint:
        path: /usr
        options: defaults,ro

os:
  bootloader:
    resetType: hard-reset
  hostname: trident-selinux-testimg

  selinux:
    mode: enforcing

  kernelCommandLine:
    extraCommandLine:
      - console=tty0
      - console=ttyS0
      - rd.info
      - log_buf_len=1M
      - rd.hostonly=0

  packages:
    remove:
      - grub2-efi-binary

    install:
      - binutils
      - curl
      - device-mapper
      - efibootmgr
      - iproute
      - iptables
      - lvm2
      - mdadm
      - netplan
      - openssh-server
      - systemd-udev
      - tpm2-tools
      - trident-service
      # NOTE: trident-test-selinux is intentionally NOT installed.
      # This image validates the production SELinux policy alone.
      - trident-static-pcrlock-files
      - veritysetup
      - vim
      - systemd-ukify
      - systemd-boot
      - audit
      - selinux-policy-devel

  services:
    enable:
      - trident
      - tridentd.socket
  uki:
    mode: create

  additionalFiles:
    - source: files/sudoers-wheel
      destination: /etc/sudoers.d/wheel
    - source: files/dracut-nohostonly.conf
      destination: /usr/lib/dracut/dracut.conf.d/nohostonly.conf
    # For tests, override the public trident.service behavior and use
    # grpc-client commit.
    - source: files/use-grpc-client-commit.conf
      destination: /etc/systemd/system/trident.service.d/override.conf
    # Trident update service template — runs updates via systemd domain
    # transition (init_t -> trident_t), exercising the production SELinux path.
    - source: files/trident-update@.service
      destination: /usr/lib/systemd/system/trident-update@.service

output:
  artifacts:
    items:
      - ukis
    path: ./output

previewFeatures:
  - uki
  - output-artifacts

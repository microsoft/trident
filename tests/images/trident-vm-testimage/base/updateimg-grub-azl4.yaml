storage:
  bootType: efi
  disks:
    - maxSize: 5G
      partitionTableType: gpt
      partitions:
        - id: esp
          size: 64M
          type: esp
        - id: root
          size: 4G

  filesystems:
    - deviceId: esp
      mountPoint:
        options: umask=0077
        path: /boot/efi
      type: fat32
    - deviceId: root
      mountPoint: /
      type: ext4

os:
  hostname: trident-vm-testimg
  packages:
    install:
      # AZL4 equivalents of the AZL3 set in updateimg-grub.yaml.
      # Notable differences:
      #   - dnf5 (no `dnf` package on AZL4)
      #   - grub2-efi-x64 + grub2-efi-x64-modules (no `-noprefix` package)
      #   - iptables-nft (no plain `iptables` meta on AZL4 base)
      #   - netplan available but not strictly required (Trident host config
      #     drives target networking; we use systemd-networkd for the
      #     management environment)
      #   - shim added (AZL4 ships a real signed shim chain)
      #   - trident-service intentionally omitted: no AZL4 RPM yet, the
      #     binary is delivered via additionalFiles below.
      - curl
      - dnf5
      - efibootmgr
      - grub2-efi-x64
      - grub2-efi-x64-modules
      - grub2-tools
      - grub2-tools-efi
      - iproute
      - iptables-nft
      - jq
      - lsof
      - openssh-server
      - shim
      - sudo
      - systemd-networkd
      - systemd-resolved
      - vim
  bootloader:
    resetType: hard-reset
  selinux:
    mode: disabled
  kernelCommandLine:
    extraCommandLine:
      - console=tty0
      - console=ttyS0
      - net.ifnames=0
      - rd.debug
      - loglevel=6
      - log_buf_len=1M
      - systemd.journald.forward_to_console=1
  services:
    enable:
      - sshd
      - systemd-networkd
      - systemd-resolved
  users:
    - name: testing-user
      sshPublicKeyPaths:
        - files/id_rsa.pub
      secondaryGroups:
        - wheel
  additionalFiles:
    # Bake the patched Trident binary into /usr/bin/trident.
    # Path is resolved relative to this YAML file. Pipeline / local builds
    # are expected to drop the binary at trident-bin/trident before invoking
    # testimages.py build (see README in this directory).
    - source: trident-bin/trident
      destination: /usr/bin/trident
      permissions: "755"
    # AZL4 lacks a /usr/bin/hostname binary; the pytest framework smoke-
    # tests SSH with `hostname`, so we ship a tiny shim.
    - source: files/hostname-shim.sh
      destination: /usr/local/bin/hostname
      permissions: "755"
    - source: files/sudoers-wheel
      destination: /etc/sudoers.d/wheel
    - source: files/99-dhcp-eth0.network
      destination: /etc/systemd/network/99-dhcp-eth0.network
    - source: files/regen-sshd-keys.service
      destination: /etc/systemd/system/regen-sshd-keys.service

scripts:
  postCustomization:
    # AZL3 image scripts are largely safe on AZL4, but a couple touch
    # /etc paths that read-only differently. We use AZL4-specific copies
    # as we discover divergence.
    - path: scripts/post-install.sh
    - path: scripts/ssh-move-host-keys-azl4.sh
    - path: scripts/enable-regen-sshd-keys.sh

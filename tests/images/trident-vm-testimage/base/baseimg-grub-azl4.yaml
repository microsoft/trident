# Base image config for trident-vm-grub-azl4-testimage.
#
# This builds the BOOTABLE base qcow2 that storm-trident rollback tests
# start the VM from. After this qcow2 boots, trident is installed and ready
# to drive A/B updates to the .cosi produced by updateimg-grub-azl4.yaml.
#
# Layout mirrors AZL3's baseimg-grub.yaml (A/B partitions) but uses
# AZL4-specific package names (dnf5, grub2-efi-x64, shim, etc.) matching
# the updateimg-grub-azl4.yaml flavor.
#
# TODO(azl4-rpm): Drop the trident additionalFiles entries
# once an AZL4 trident-service RPM is published. Until then we bake
# the binary inline.

storage:
  disks:
    - partitionTableType: gpt
      maxSize: 10G
      partitions:
        - id: esp
          type: esp
          size: 32M

        - id: root-a
          size: 4G

        - id: root-b
          size: 4G

        - id: trident
          size: 1G

        - id: srv
          size: grow

  bootType: efi

  filesystems:
    - deviceId: esp
      type: fat32
      mountPoint:
        path: /boot/efi
        options: umask=0077

    - deviceId: root-a
      type: ext4
      mountPoint: /

    - deviceId: trident
      type: ext4
      mountPoint: /var/lib/trident

    - deviceId: srv
      type: ext4
      mountPoint: /srv

os:
  bootloader:
    resetType: hard-reset
  hostname: trident-vm-testimg

  selinux:
    mode: disabled

  kernelCommandLine:
    # Mirrors AZL3 baseimg-grub.yaml; same console + debug settings so
    # serial output works the same on both flavors. `net.ifnames=0`
    # keeps interface naming as eth0/eth1/... so the
    # `99-dhcp-eth0.network` systemd-networkd config matches the only
    # virtio NIC the qemu test VM ships with.
    extraCommandLine:
      - console=tty0
      - console=tty1
      - console=ttyS0
      - net.ifnames=0
      - rd.debug
      - loglevel=6
      - log_buf_len=1M
      - systemd.journald.forward_to_console=1

  packages:
    install:
      # AZL4 equivalents of the AZL3 set. See updateimg-grub-azl4.yaml
      # for the rationale on each substitution.
      - curl
      - dnf5
      - efibootmgr
      - grub2-efi-x64
      - grub2-efi-x64-modules
      - grub2-tools
      - grub2-tools-efi
      - iproute
      - iptables-nft
      - jq
      - lsof
      - netplan
      - netplan-default-backend-networkd
      - openssh-server
      - shim
      - sudo
      - systemd-networkd
      - systemd-resolved
      - vim
      # AZL4 systemd (258.4) moves systemd-dissect and mount.ddi from the
      # main systemd package into the systemd-container subpackage.  mount.ddi
      # is needed for sysext/sysconf
      - systemd-sysext
      - systemd-confext
      - systemd-dissect
      # get trident from RPM
      - trident-service

  services:
    enable:
      - sshd
      - systemd-networkd
      - systemd-resolved
      # Trident socket-activated daemon. Storm-trident drives all
      # update/commit/rollback through `trident grpc-client ...` which
      # talks to this socket.
      - tridentd.socket

  additionalFiles:
    # AZL4 lacks a /usr/bin/hostname binary; the pytest framework
    # smoke-tests SSH with `hostname`, so we ship a tiny shim.
    - source: files/hostname-shim.sh
      destination: /usr/local/bin/hostname
      permissions: "755"
    - source: files/sudoers-wheel
      destination: /etc/sudoers.d/wheel
    - source: files/99-dhcp-eth0.network
      destination: /etc/systemd/network/99-dhcp-eth0.network
    - source: files/regen-sshd-keys.service
      destination: /etc/systemd/system/regen-sshd-keys.service

  users:
    - name: testuser
      sshPublicKeyPaths:
        - files/id_rsa.pub
      secondaryGroups:
        - wheel

scripts:
  postCustomization:
    # Mirrors AZL3's baseimg-grub.yaml ordering: post-install runs
    # first, then we bake the trident datastore at build time (so first
    # boot is fast and storm-trident can immediately drive updates),
    # then ssh + network housekeeping, then initrd rebuild + xattr
    # strip last.
    - path: scripts/post-install.sh
    # Bake trident's hoststatus into the datastore at build time. AZL3
    # does this via update-host-status.sh; AZL4 reuses the same script.
    # Requires trident's offline-init
    # to tolerate the absence of /dev/sda inside MIC's chroot (the
    # `disk` argument is a runtime label, not a build-time assertion);
    # the fix lives in crates/trident/src/init/offline/mod.rs.
    - path: scripts/update-host-status.sh
    - path: scripts/enable-trident-service-azl4.sh
    - path: scripts/prepare-update-config.sh
    - path: scripts/ssh-move-host-keys-azl4.sh
    - path: scripts/enable-regen-sshd-keys.sh
    # Rebuild initramfs with --no-hostonly + extra SATA drivers so the
    # qcow2 boots regardless of which bus the consumer's libvirt config
    # picks (storm-trident uses bus=sata; the original boot test on
    # karhu-ubuntu used bus=virtio). MUST run BEFORE strip-selinux-xattrs
    # because dracut writes new files with the build-time SELinux
    # context, and we want those stripped too.
    - path: scripts/rebuild-initrd-azl4.sh
    # Strip security.selinux xattrs from all files. See updateimg-grub-
    # azl4.yaml for the parallel write-up; the same MOS-side AZL3
    # SELinux policy rejects AZL4 contexts when any future operation
    # tries to preserve them. Keeping the qcow2 label-free is defensive.
    # MUST run LAST so it sweeps any files produced by earlier scripts
    # (initrd, etc.).
    - path: scripts/strip-selinux-xattrs.sh
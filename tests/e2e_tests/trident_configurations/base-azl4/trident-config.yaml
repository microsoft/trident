image:
  url: http://NETLAUNCH_HOST_ADDRESS/files/regular.cosi
  sha384: ignored
internalParams:
  # AZL4 doesn't ship grub2-efi-binary-noprefix (no longer needed; grub
  # is built without a hardcoded prefix). Trident's noprefix check
  # otherwise bails because grubx64-noprefix.efi isn't in the COSI's
  # boot image. PR-1 added this opt-in flag; auto-detection by distro
  # is a follow-on.
  disableGrubNoprefixCheck: true
storage:
  disks:
    - id: os
      device: /dev/disk/by-path/pci-0000:00:1f.2-ata-2
      partitionTableType: gpt
      partitions:
        - id: root-a
          type: root
          size: 8G
        - id: root-b
          type: root
          size: 8G
        - id: esp
          type: esp
          size: 1G
        - id: trident
          type: linux-generic
          size: 1G
    - id: disk2
      device: /dev/disk/by-path/pci-0000:00:1f.2-ata-3
      partitionTableType: gpt
      partitions: []
  abUpdate:
    volumePairs:
      - id: root
        volumeAId: root-a
        volumeBId: root-b
  filesystems:
    - deviceId: trident
      source: new
      mountPoint: /var/lib/trident
    - deviceId: esp
      mountPoint:
        path: /boot/efi
        options: umask=0077
    - deviceId: root
      mountPoint: /
# AZL4 baseline scenario for the pytest E2E framework. Mirrors the AZL3
# `base/` scenario as closely as possible while staying inside what PR-4's
# native hostname-carry-over fast path can serve.
#
# Why no `os:` section yet:
#   The MOS install ISO (built from tests/images/trident-mos/iso.yaml)
#   does not include /usr/bin/osmodifier. PR-5 bakes osmodifier into the
#   target image so post-install Trident operations (update, runtime
#   apply) can drive os.users / os.selinux / os.netplan via osmodifier,
#   but the install-time validation runs in the MOS environment which
#   currently lacks the binary. Until the MOS ISO is rebuilt with
#   azurelinux-image-tools-osmodifier installed (a small follow-up), the
#   install path must stick to PR-4's hostname-only fast path.
#
# Once the MOS includes osmodifier, this file can grow to mirror `base/`
# more completely (os.users, os.selinux, os.netplan).
#
# Other differences from base/:
#   - No swap or /home partitions (kept simple for the first AZL4 scenario;
#     swap support is its own follow-up and /home isn't load-bearing here).
#   - No postConfigure sudo grant: the testing-user is added to wheel by
#     the testimage MIC config and /etc/sudoers.d/wheel grants nopasswd.

image:
  url: http://NETLAUNCH_HOST_ADDRESS/files/regular.cosi
  sha384: ignored
# AZL4 does not ship grub2-efi-binary-noprefix. Trident handles this
# automatically — no disableGrubNoprefixCheck override needed.
storage:
  disks:
    - id: os
      device: /dev/disk/by-path/pci-0000:00:1f.2-ata-2
      partitionTableType: gpt
      partitions:
        - id: root-a
          type: root
          size: 8G
        - id: root-b
          type: root
          size: 8G
        - id: esp
          type: esp
          size: 1G
        - id: trident
          type: linux-generic
          size: 1G
    - id: disk2
      device: /dev/disk/by-path/pci-0000:00:1f.2-ata-3
      partitionTableType: gpt
      partitions: []
  abUpdate:
    volumePairs:
      - id: root
        volumeAId: root-a
        volumeBId: root-b
  filesystems:
    - deviceId: trident
      source: new
      mountPoint: /var/lib/trident
    - deviceId: esp
      mountPoint:
        path: /boot/efi
        options: umask=0077
    - deviceId: root
      mountPoint: /
# AZL4 baseline scenario for the pytest E2E framework. Mirrors the AZL3
# `base/` scenario with these differences:
#
#   - No `os:` section: users, SSH keys, networking, and sudoers are
#     baked into the test image at MIC build time. Can grow to mirror
#     `base/` more completely as AZL4 testing matures.
#   - No swap or /home partitions (kept simple for the first AZL4
#     scenario).
#   - No postConfigure sudo grant: testing-user is added to wheel by
#     the testimage MIC config.

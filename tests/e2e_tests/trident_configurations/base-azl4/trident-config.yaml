image:
  url: http://NETLAUNCH_HOST_ADDRESS/files/regular.cosi
  sha384: ignored
storage:
  disks:
    - id: os
      device: /dev/disk/by-path/pci-0000:00:1f.2-ata-2
      partitionTableType: gpt
      partitions:
        - id: root-a
          type: root
          size: 8G
        - id: root-b
          type: root
          size: 8G
        - id: esp
          type: esp
          size: 1G
        - id: trident
          type: linux-generic
          size: 1G
    - id: disk2
      device: /dev/disk/by-path/pci-0000:00:1f.2-ata-3
      partitionTableType: gpt
      partitions: []
  abUpdate:
    volumePairs:
      - id: root
        volumeAId: root-a
        volumeBId: root-b
  filesystems:
    - deviceId: trident
      source: new
      mountPoint: /var/lib/trident
    - deviceId: esp
      mountPoint:
        path: /boot/efi
        options: umask=0077
    - deviceId: root
      mountPoint: /
scripts:
  postConfigure:
    - name: testing-privilege
      runOn:
        - clean-install
        - ab-update
      content: echo 'testing-user ALL=(ALL:ALL) NOPASSWD:ALL' > /etc/sudoers.d/testing-user
os:
  selinux:
    mode: disabled
  netplan:
    version: 2
    ethernets:
      vmeths:
        match:
          name: eth*
        dhcp4: true
  users:
    - name: testing-user
      sshPublicKeys: []
      sshMode: key-only
# AZL4 baseline scenario for the pytest E2E framework. Mirrors the AZL3
# `base/` scenario as closely as possible so the same test markers apply.
#
# Differences from `base/`:
#   - No swap or /home partitions (kept simple for the first AZL4 scenario;
#     swap support is its own follow-up and /home isn't load-bearing here).
#   - `os.netplan.ethernets.vmeths.match.name` uses `eth*` instead of
#     `enp*` because the AZL4 testimage boots with `net.ifnames=0` (the
#     virtdeploy QEMU NIC arrives as `eth0`, not `enp0s2`).
#   - `os.selinux.mode: disabled`. The AZL4 testimage builds with
#     selinux disabled (no policy loaded) to match how the manual M1 work
#     was validated; once we land an SELinux-enforcing scenario we'll
#     copy this into a `base-azl4-selinux` variant.
#
# This config drives os.users/os.netplan/os.selinux through Trident, so
# the test image must have /usr/bin/osmodifier present. PR-5 bakes that
# in via additionalFiles until the AZL4 osmodifier RPM is published.

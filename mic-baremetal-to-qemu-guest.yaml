os:
  bootloader:
    resetType: hard-reset
  hostname: azure-linux
  kernelCommandLine:
    extraCommandLine:
    - console=tty0
    - console=ttyS0
  selinux:
    mode: disabled
  packages:
    remove:
    - dracut-hostonly
    - dracut-megaraid
    - selinux-policy
    install:
    - dracut-virtio
    - qemu-guest-agent